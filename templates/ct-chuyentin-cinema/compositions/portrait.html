<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>CT ChuyenTin Cinema · Portrait</title>
<style>
  @font-face { font-family: 'Quicksand'; font-weight: 700 900; src: url('capture/assets/fonts/Quicksand-700-vi.woff2') format('woff2'); unicode-range: U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB; }
  @font-face { font-family: 'Quicksand'; font-weight: 700 900; src: url('capture/assets/fonts/Quicksand-700-latin.woff2') format('woff2'); unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  @font-face { font-family: 'Be Vietnam Pro'; font-weight: 400; src: url('capture/assets/fonts/BeVietnamPro-400-vi.woff2') format('woff2'); unicode-range: U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB; }
  @font-face { font-family: 'Be Vietnam Pro'; font-weight: 400; src: url('capture/assets/fonts/BeVietnamPro-400-latin.woff2') format('woff2'); unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  @font-face { font-family: 'Be Vietnam Pro'; font-weight: 600 900; src: url('capture/assets/fonts/BeVietnamPro-700-vi.woff2') format('woff2'); unicode-range: U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB; }
  @font-face { font-family: 'Be Vietnam Pro'; font-weight: 600 900; src: url('capture/assets/fonts/BeVietnamPro-700-latin.woff2') format('woff2'); unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  @font-face { font-family: 'JetBrains Mono'; font-weight: 400; src: url('capture/assets/fonts/JetBrainsMono-400-latin.woff2') format('woff2'); }
  @font-face { font-family: 'JetBrains Mono'; font-weight: 700; src: url('capture/assets/fonts/JetBrainsMono-700-latin.woff2') format('woff2'); }

<style>
  :root {
    --navy: #191127;
    --deep: #1A0A2E;
    --purple: #7726B6;
    --purple-2: #9B4DE8;
    --dark-purple: #2A1045;
    --rich-purple: #361058;
    --gold: #F5BE2B;
    --gold-2: #F2C230;
    --lav: #F1ECFB;
    --lav-2: #F2EBFC;
    --border: #E0DBE9;
    --white: #FFFFFF;
    --ink: #191127;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #05020a; }
  #root {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    padding: 0; color: var(--white);
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
    background:
      linear-gradient(180deg, rgba(5,2,10,.42), rgba(5,2,10,.06) 31%, rgba(5,2,10,.78)),
      radial-gradient(circle at 20% 11%, rgba(245,190,43,.20), transparent 29%),
      radial-gradient(circle at 86% 16%, rgba(119,38,182,.42), transparent 34%),
      linear-gradient(145deg, var(--navy) 0%, var(--deep) 48%, var(--dark-purple) 100%);
  }
  #root.light {
    color: var(--ink);
    background:
      radial-gradient(circle at 16% 8%, rgba(245,190,43,.22), transparent 31%),
      radial-gradient(circle at 86% 10%, rgba(119,38,182,.18), transparent 30%),
      linear-gradient(145deg, #FEFDFF 0%, var(--lav) 56%, #FFFFFF 100%);
  }
  #root::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .16;
    background-image:
      linear-gradient(rgba(255,255,255,.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.18) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  #root::after {
    content: ""; position: absolute; inset: 28px; pointer-events: none; z-index: 4;
    border: 2px solid rgba(255,255,255,.18);
    box-shadow: inset 0 0 0 1px rgba(25,17,39,.36), 0 0 0 999px rgba(5,2,10,.10);
  }
  #root.light::before { opacity: .42; background-image: linear-gradient(rgba(119,38,182,.09) 1px, transparent 1px), linear-gradient(90deg, rgba(119,38,182,.09) 1px, transparent 1px); }
  .chrome { position: relative; z-index: 1; height: 100%; }
  .top {
    position: absolute; left: 52px; right: 52px; top: 54px; z-index: 6;
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand { font: 900 29px/1 'Quicksand', sans-serif; letter-spacing: 0; }
  .brand span { color: var(--gold); }
  .pill {
    max-width: 670px; height: 44px; padding: 0 16px; border-radius: 999px;
    display: flex; align-items: center; color: var(--navy);
    background: var(--gold); box-shadow: 0 6px 20px rgba(245,190,43,.22);
    font: 900 14px/20px 'Be Vietnam Pro', sans-serif; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pill::before { content: "REC"; margin-right: 10px; color: #B00020; font: 900 13px/1 'JetBrains Mono', monospace; }
  .canvas {
    position: absolute; inset: 0; min-height: 0; border-radius: 0; padding: 0;
    background: transparent; border: 0; box-shadow: none;
  }
  .light .canvas { background: transparent; border-color: transparent; box-shadow: none; }
  .scene {
    height: 100%; border-radius: 0; overflow: hidden; padding: 128px 58px 128px;
    background:
      linear-gradient(180deg, rgba(25,17,39,.12), rgba(25,17,39,.70)),
      linear-gradient(135deg, var(--dark-purple), var(--rich-purple) 52%, #3D2060);
    position: relative; display: flex; flex-direction: column;
  }
  .light .scene { background: rgba(255,255,255,.92); color: var(--ink); border: 1px solid var(--border); }
  .footer {
    position: absolute; left: 52px; right: 52px; bottom: 52px; z-index: 6;
    display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
    color: rgba(255,255,255,.78); font: 700 14px/1 'JetBrains Mono', monospace;
  }
  .light .footer { color: rgba(25,17,39,.58); }
  .track { height: 4px; border-radius: 999px; background: rgba(255,255,255,.18); overflow: hidden; }
  .light .track { background: var(--border); }
  .bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--purple), var(--gold)); border-radius: inherit; }
  .eyebrow { color: var(--gold); font: 900 14px/20px 'Be Vietnam Pro', sans-serif; letter-spacing: .08em; text-transform: uppercase; }
  .h1 { font: 900 108px/.92 'Quicksand', sans-serif; letter-spacing: 0; margin-top: 18px; max-width: 960px; text-wrap: balance; }
  .h2 { font: 900 78px/.96 'Quicksand', sans-serif; letter-spacing: 0; text-wrap: balance; }
  .body {
    font: 700 31px/1.38 'Be Vietnam Pro', sans-serif; color: rgba(255,255,255,.90);
    max-width: 930px; margin-top: 26px; text-shadow: 0 2px 14px rgba(0,0,0,.26);
  }
  .light .body { color: rgba(25,17,39,.82); }
  .gold { color: var(--gold); }
  .hero { justify-content: center; }
  .cta { margin-top: 34px; display: inline-flex; width: max-content; height: 44px; align-items: center; padding: 0 16px; border-radius: 999px; background: var(--gold); color: var(--navy); font: 900 14px/20px 'Be Vietnam Pro', sans-serif; box-shadow: 0 10px 24px rgba(245,190,43,.22); }
  .stat-num { font: 900 168px/.86 'Quicksand', sans-serif; color: var(--gold); margin: 48px 0 22px; }
  .list { display: grid; gap: 26px; margin-top: 44px; }
  .item {
    display: grid; grid-template-columns: 54px 1fr auto; align-items: center; gap: 16px;
    min-height: 138px; padding: 22px 0 22px 0; border-radius: 0;
    background: transparent; border-top: 1px solid rgba(255,255,255,.20);
  }
  .light .item { background: transparent; border-color: rgba(119,38,182,.20); }
  .icon { width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; background: var(--gold); color: var(--navy); font-size: 26px; font-weight: 900; }
  .item-title { font: 900 32px/1.12 'Quicksand', sans-serif; }
  .item-desc { margin-top: 8px; font: 700 22px/1.3 'Be Vietnam Pro', sans-serif; color: rgba(255,255,255,.78); }
  .light .item-desc { color: rgba(25,17,39,.68); }
  .tag { border-radius: 999px; padding: 7px 10px; background: rgba(245,190,43,.18); color: var(--gold); font: 900 11px/16px 'Be Vietnam Pro', sans-serif; }
  .poster-lines { display: grid; gap: 10px; margin-top: 36px; }
  .poster-lines div { font: 900 96px/.88 'Quicksand', sans-serif; }
  .poster-lines div:nth-child(2) { color: var(--gold); }
  .mono-title { font: 900 98px/.9 'Quicksand', sans-serif; color: var(--gold); margin: auto 0; text-transform: uppercase; }
  .outro { align-items: center; justify-content: center; text-align: center; }
  .outro .brand-big { font: 900 92px/.95 'Quicksand', sans-serif; }
  .outro .brand-big span { color: var(--gold); }
  .tree-layout { display: grid; grid-template-rows: 1110px 1fr; gap: 24px; padding: 122px 38px 112px; background: linear-gradient(145deg, var(--navy), var(--dark-purple)); color: var(--white); }
  .tree-stage { position: relative; margin: 0; border-radius: 0; background: transparent; border: 0; overflow: hidden; }
  .tree-zone { position: absolute; inset: 108px 12px 112px; }
  .tree-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .tree-line { stroke: rgba(241,236,251,.32); stroke-width: 5; stroke-linecap: round; }
  .tree-line.new { stroke: var(--purple); stroke-dasharray: 1; stroke-dashoffset: 1; animation: drawLine 850ms cubic-bezier(.32,.72,0,1) forwards; }
  .tree-line.visited { stroke: rgba(119,38,182,.62); }
  .node {
    position: absolute; width: 98px; height: 98px; border-radius: 50%; transform: translate(-50%, -50%);
    display: grid; place-items: center; background: #FEFDFF; border: 2px solid rgba(241,236,251,.72);
    box-shadow: 0 14px 24px rgba(0,0,0,.28); color: var(--ink); font: 900 38px/1 'Quicksand', sans-serif;
  }
  .node.visited { background: var(--lav); border-color: rgba(119,38,182,.32); }
  .node.current { border-color: var(--gold); box-shadow: 0 0 0 9px rgba(245,190,43,.18), 0 8px 16px rgba(119,38,182,.18); animation: breathe 1500ms cubic-bezier(.32,.72,0,1) infinite; }
  .node.new { opacity: 0; animation: nodeIn 740ms cubic-bezier(.16,1,.3,1) forwards; }
  .tree-status { position: absolute; left: 24px; right: 24px; bottom: 22px; border-radius: 0; padding: 18px 0; border-top: 1px solid rgba(255,255,255,.20); background: transparent; color: white; font: 900 28px/1.22 'Be Vietnam Pro', sans-serif; text-shadow: 0 2px 14px rgba(0,0,0,.30); }
  .tree-head { position: absolute; left: 24px; top: 24px; right: 24px; display: flex; justify-content: space-between; align-items: start; gap: 18px; }
  .tree-head h2 { font: 900 56px/1 'Quicksand', sans-serif; }
  .tree-head p { font: 900 16px/1 'JetBrains Mono', monospace; color: var(--purple); margin-top: 8px; }
  .code-state { display: grid; grid-template-columns: 1.08fr .92fr; gap: 18px; padding: 0; }
  .panel { border-radius: 0; border: 1px solid rgba(255,255,255,.18); background: rgba(25,17,39,.62); padding: 18px; overflow: hidden; backdrop-filter: blur(10px); }
  .panel-label { color: var(--gold); font: 900 12px/1 'JetBrains Mono', monospace; letter-spacing: .12em; margin-bottom: 10px; }
  .code { font: 400 21px/1.38 'JetBrains Mono', monospace; color: rgba(255,255,255,.90); }
  .code-row { display: grid; grid-template-columns: 32px 1fr; gap: 10px; padding: 3px 6px; border-radius: 8px; }
  .code-row.active { background: var(--gold); color: var(--navy); }
  .ln { color: #9B8DB2; text-align: right; }
  .var { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 11px 0; border-radius: 0; border-top: 1px solid rgba(255,255,255,.14); background: transparent; margin-bottom: 0; color: white; }
  .var.changed { color: var(--gold); }
  .var-name { font: 900 17px/1 'Be Vietnam Pro', sans-serif; color: inherit; }
  .var-val { font: 700 16px/1 'JetBrains Mono', monospace; max-width: 210px; overflow: hidden; text-overflow: ellipsis; }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes nodeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(.62); filter: blur(8px); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); } }
  @keyframes breathe { 0%,100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.06); } }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
  <div class="chrome">
    <header class="top"><div class="pill" id="top-pill">CHUYENTIN · TEMPLATE</div><div class="brand">Chuyen<span>Tin</span></div></header>
    <main class="canvas"><section class="scene" id="scene"></section></main>
    <footer class="footer"><span id="foot-left">chuyentin.com</span><div class="track"><div class="bar" id="bar"></div></div><span id="foot-right">Lập trình mỗi ngày</span></footer>
  </div>
</div>
<script>
(function () {
  var v = window.__hyperframes && typeof window.__hyperframes.getVariables === "function" ? window.__hyperframes.getVariables() : {};
  var root = document.getElementById("root");
  var scene = document.getElementById("scene");
  var pill = document.getElementById("top-pill");
  function txt(x, f) { return x === undefined || x === null || x === "" ? f : String(x); }
  function esc(x) { return txt(x, "").replace(/[&<>]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c]; }); }
  function setTop(label) { pill.textContent = label; }
  function firstHeadline() {
    if (Array.isArray(v.headline)) return v.headline.join(" ");
    return txt(v.headline || v.hero || v.title || v.brand_name || v.label, "ChuyenTin");
  }
  function renderTree() {
    root.classList.remove("light");
    setTop(txt(v.badge, "TREE TRACE"));
    scene.className = "scene tree-layout";
    scene.innerHTML = '<div class="tree-stage"><div class="tree-head"><div><h2>Tree Sort</h2><p>BINARY SEARCH TREE</p></div></div><div class="tree-zone" id="tree-zone"></div><div class="tree-status">'+esc(v.status || "Đang thực hiện")+'</div></div><div class="code-state"><div class="panel"><div class="panel-label">ACTIVE CODE</div><div class="code" id="code"></div></div><div class="panel"><div class="panel-label">STATE INSPECTOR</div><div id="vars"></div></div></div>';
    var code = document.getElementById("code");
    (Array.isArray(v.code_lines) ? v.code_lines : []).slice(0, 13).forEach(function (r) {
      var n = typeof r === "object" ? r.n : ""; var t = typeof r === "object" ? r.t : String(r);
      var row = document.createElement("div"); row.className = "code-row" + (n === v.active_line_num ? " active" : "");
      row.innerHTML = '<span class="ln">'+n+'</span><span>'+esc((n === v.active_line_num ? "▶ " : "  ") + t)+'</span>'; code.appendChild(row);
    });
    var vars = document.getElementById("vars");
    (Array.isArray(v.variables) ? v.variables : []).slice(0, 5).forEach(function (it) {
      var row = document.createElement("div"); row.className = "var" + (it.changed ? " changed" : "");
      row.innerHTML = '<span class="var-name">'+esc(it.name)+'</span><span class="var-val">'+esc(it.value)+'</span>'; vars.appendChild(row);
    });
    var zone = document.getElementById("tree-zone");
    var nodes = Array.isArray(v.tree_nodes) ? v.tree_nodes : [], visited = Array.isArray(v.visited_ids) ? v.visited_ids : [], current = v.current_id, map = {}, rootNode = null;
    nodes.forEach(function (n) { map[n.id] = { id:n.id, value:n.value, parent:n.parent, children:[] }; });
    nodes.forEach(function (n) { if (!n.parent || !map[n.parent]) rootNode = map[n.id]; else map[n.parent].children.push(map[n.id]); });
    function layout(node, x, y, spread) { node.x=x; node.y=y; if (node.children.length===1) layout(node.children[0], x, y+26, spread*.55); if (node.children.length>=2) { layout(node.children[0], x-spread, y+26, spread*.52); layout(node.children[1], x+spread, y+26, spread*.52); } }
    if (rootNode) layout(rootNode, 50, 18, 28);
    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg"); svg.setAttribute("class", "tree-svg"); zone.appendChild(svg);
    nodes.forEach(function (n) { var node = map[n.id], p = node && map[node.parent]; if (!node || !p) return; var line = document.createElementNS("http://www.w3.org/2000/svg", "line"); line.setAttribute("x1", p.x+"%"); line.setAttribute("y1", p.y+"%"); line.setAttribute("x2", node.x+"%"); line.setAttribute("y2", node.y+"%"); line.setAttribute("pathLength", "1"); var isNew = !visited.includes(node.id) || current === node.id; line.setAttribute("class", "tree-line" + (visited.includes(node.id) ? " visited" : "") + (isNew ? " new" : "")); svg.appendChild(line); });
    nodes.forEach(function (n, i) { var node = map[n.id]; if (!node) return; var el = document.createElement("div"); var isCur = current === n.id, isVisited = visited.includes(n.id), isNew = !isVisited || isCur; el.className = "node" + (isVisited ? " visited" : "") + (isCur ? " current" : "") + (isNew ? " new" : ""); el.style.left = node.x+"%"; el.style.top = node.y+"%"; el.style.animationDelay = Math.min(i*.08,.48)+"s"; el.textContent = node.value; zone.appendChild(el); });
  }
  function renderList() {
    root.classList.remove("light"); setTop(txt(v.title, "DANH SÁCH") + " " + txt(v.accent, ""));
    scene.innerHTML = '<div class="eyebrow">'+esc(v.subtitle || "ChuyenTin")+'</div><h1 class="h2">'+esc(txt(v.title,""))+' <span class="gold">'+esc(txt(v.accent,""))+'</span></h1><div class="list" id="list"></div>';
    (Array.isArray(v.items) ? v.items : []).slice(0,5).forEach(function (it, idx) {
      var d = document.createElement("div"); d.className = "item";
      d.innerHTML = '<div class="icon">'+esc(it.icon || String(idx+1))+'</div><div><div class="item-title">'+esc(it.title)+'</div><div class="item-desc">'+esc(it.desc)+'</div></div><div class="tag">'+esc(it.tag || "")+'</div>';
      document.getElementById("list").appendChild(d);
    });
  }
  function renderOutro() {
    setTop("CHUYENTIN · OUTRO"); scene.className = "scene outro";
    scene.innerHTML = '<div class="brand-big">Chuyen<span>Tin</span></div><p class="body">'+esc(v.tagline || "Lập trình mỗi ngày")+'</p><div class="cta">'+esc(v.primary_url || "chuyentin.com")+'</div>';
  }
  function renderStat() {
    setTop(txt(v.label, "PHÂN TÍCH")); scene.innerHTML = '<div class="eyebrow">'+esc(v.label || "")+'</div><div class="stat-num">'+esc(v.headline || "")+'</div><h1 class="h2">'+esc(v.footer_right || "Time Complexity")+'</h1><p class="body">'+esc(v.subtitle || "")+'</p>';
  }
  function renderPoster() {
    setTop(txt(v.kicker, "CHUYENTIN")); var lines = Array.isArray(v.headline) ? v.headline : [firstHeadline()];
    scene.innerHTML = '<div class="eyebrow">'+esc(v.date || v.kicker || "ChuyenTin")+'</div><div class="poster-lines">'+lines.slice(0,3).map(function (x) { return '<div>'+esc(x)+'</div>'; }).join("")+'</div><p class="body">'+esc(v.standfirst || v.subheadline || v.desc || "")+'</p>';
  }
  function renderTitle() {
    setTop("CODE TITLE"); scene.className = "scene hero";
    scene.innerHTML = '<div class="mono-title">'+esc(v.title || firstHeadline())+'</div><p class="body">'+esc(v.subtitle || "")+'</p>';
  }
  function renderHero() {
    setTop(txt(v.kicker, "CHUYENTIN")); scene.className = "scene hero";
    scene.innerHTML = '<div class="eyebrow">'+esc(v.kicker || "ChuyenTin")+'</div><h1 class="h1">'+esc(firstHeadline())+'</h1><p class="body">'+esc(v.subheadline || v.desc || v.standfirst || "")+'</p><div class="cta">'+esc(v.cta || "Học ngay")+'</div>';
  }
  if (Array.isArray(v.tree_nodes)) renderTree();
  else if (Array.isArray(v.items)) renderList();
  else if (v.brand_name) renderOutro();
  else if (v.label && v.headline) renderStat();
  else if (v.title && v.subtitle) renderTitle();
  else if (Array.isArray(v.headline)) renderPoster();
  else renderHero();
  var step = typeof v.step_index === "number" ? v.step_index : 1, total = typeof v.total_steps === "number" ? v.total_steps : 1;
  document.getElementById("bar").style.width = Math.max(8, Math.min(100, step / total * 100)) + "%";
  window.__timelines = window.__timelines || {};
  window.__timelines.main = { pause: function(){}, seek: function(){}, paused: function(){ return true; } };
})();
</script>
</body>
</html>
