<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>CT Comparison · Portrait 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /*
   * ct-comparison — ChuyenTin branded comparison frame. Portrait 9:16 (1080×1920).
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #ffffff; }
  #root {
    position: relative; width: 1080px; height: 1920px; background: #ffffff; color: #1a1440;
    font-family: 'Be Vietnam Pro', system-ui, sans-serif; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 70px;
  }

  .bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #f0edf8 0%, #ffffff 50%, #f0edf8 100%);
    background-size: 200% 200%;
    animation: bgShift 12s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes bgShift {
    from { background-position: 0% 30%; }
    to { background-position: 100% 70%; }
  }

  #root::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(10, 5, 20, 0.15) 100%);
    z-index: 99; pointer-events: none;
  }

  #root {
    animation: pushIn 5s linear forwards;
  }
  @keyframes pushIn {
    from { transform: scale(1); }
    to { transform: scale(1.03); }
  }
  .glow {
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 190, 43, 0.08) 0%, transparent 65%);
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    z-index: 1;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.8; transform: translate(-50%, -55%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -55%) scale(1.05); }
  }
  .grid {
    position: absolute; inset: 0; z-index: 1; opacity: 0.3;
    background-image:
      linear-gradient(rgba(155, 77, 232, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(155, 77, 232, 0.05) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* top accent bar */
  .accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(to right, #7726B6, #F5BE2B, transparent);
    z-index: 10;
    transform: scaleX(0);
    transform-origin: left;
    animation: barIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.05s forwards;
  }
  @keyframes barIn { to { transform: scaleX(1); } }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }

  .grad {
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }
  .stack { position: relative; z-index: 4; width: 100%; display: flex; flex-direction: column; align-items: center; }

  .badge { padding: 16px 36px; border-radius: 999px; font-size: 26px; font-weight: 700; letter-spacing: 5px;
    text-transform: uppercase; color: #F5BE2B; border: 1.5px solid rgba(245, 190, 43, 0.5);
    background: rgba(245, 190, 43, 0.08); opacity: 0; animation: fadeDown 0.7s ease-out 0.15s both; }

  .headline { margin-top: 40px; font-family: 'Be Vietnam Pro', sans-serif; font-size: 76px; font-weight: 900; letter-spacing: -1px; text-align: center; line-height: 1.1;
    opacity: 0; animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) 0.35s both; }
  .headline .vs { color: rgba(26, 20, 48, 0.5); font-weight: 700; margin: 0 16px; }
  .headline .pre, .headline .post { color: #1a1440; }

  .cards { margin-top: 56px; display: flex; gap: 28px; width: 100%; }
  .card { position: relative; flex: 1 1 0; min-width: 0; border-radius: 24px; padding: 44px 30px 38px;
    background: #ffffff; border: 1px solid rgba(155, 77, 232, 0.12);
    box-shadow: 0 0 24px rgba(155, 77, 232, 0.12); text-align: center;
    opacity: 0; transform: translateY(26px); animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  .card.left { animation-delay: 0.6s; }
  .card.right { animation-delay: 0.74s; }
  .card.is-win { border-color: rgba(245, 190, 43, 0.5); box-shadow: 0 12px 30px rgba(245, 190, 43, 0.12); }
  .card .ic { font-size: 56px; margin-bottom: 14px; line-height: 1; }
  .card .lbl { font-family: 'Be Vietnam Pro', sans-serif; font-size: 110px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
  .card .bullets { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  .card .bz { font-size: 23px; font-weight: 500; color: rgba(26, 20, 48, 0.65); line-height: 1.35; }
  
  .win { position: absolute; top: 22px; right: 22px; padding: 8px 20px; border-radius: 999px; font-size: 22px;
    font-weight: 900; letter-spacing: 2px; color: #1a1440; background: #F5BE2B;
    box-shadow: 0 6px 24px rgba(245, 190, 43, 0.45); opacity: 0; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.1s both; }

  .stats { margin-top: 28px; display: flex; gap: 28px; width: 100%; }
  .stat { flex: 1 1 0; border-radius: 20px; padding: 22px 20px; text-align: center;
    background: #f5f3fc; border: 1px solid rgba(155, 77, 232, 0.12);
    opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease-out both; }
  .stat.left { animation-delay: 0.95s; }
  .stat.right { animation-delay: 1.05s; }
  .stat .sv { font-family: 'Be Vietnam Pro', sans-serif; font-size: 46px; font-weight: 900; line-height: 1; }
  .stat .sl { margin-top: 6px; font-size: 20px; font-weight: 500; color: rgba(26, 20, 48, 0.5); }

  /* ChuyenTin dark preview palette override */
  html, body { background: #05020a; }
  #root { background: #191127 !important; color: #FFFFFF !important; }
  .bg { background: linear-gradient(145deg, #191127 0%, #1A0A2E 48%, #2A1045 100%) !important; }
  .grid { opacity: .2; background-image: linear-gradient(rgba(241,236,251,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(241,236,251,.07) 1px, transparent 1px); }
  .headline .pre, .headline .post { color: #FFFFFF !important; }
  .headline .vs, .card .bz, .stat .sl { color: rgba(255,255,255,.70) !important; }
  .card, .stat { background: rgba(25,17,39,.62) !important; border-color: rgba(241,236,251,.18) !important; box-shadow: 0 18px 38px rgba(0,0,0,.24); }
  .win { color: #191127 !important; background: #F5BE2B !important; }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
    <div class="bg"></div>
    <div class="glow"></div>
    <div class="grid"></div>
    <div class="accent-top"></div>

    <div class="stack">
      <div class="badge"></div>
      <h1 class="headline"></h1>
      <div class="cards">
        <div class="card left"></div>
        <div class="card right"></div>
      </div>
      <div class="stats"></div>
    </div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes && typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var L = v.left || {}, R = v.right || {};
      var LF = L.from || "#9b4de8", LT = L.to || "#7726B6";
      var RF = R.from || "#F5BE2B", RT = R.to || "#7726B6";

      var gradStyle = function (el, from, to) {
        el.style.backgroundImage = "linear-gradient(92deg, " + from + " 0%, " + to + " 100%)";
      };
      var setText = function (sel, text) {
        var el = document.querySelector(sel);
        if (el && text != null) el.textContent = String(text);
      };
      var fitLbl = function (el, maxPx, minPx) {
        if (!el || !el.textContent.trim()) return;
        el.style.whiteSpace = "nowrap";
        el.style.fontSize = maxPx + "px";
        if (el.scrollWidth > el.offsetWidth) {
          var sized = Math.max(minPx || 36, Math.floor(maxPx * el.offsetWidth / el.scrollWidth));
          el.style.fontSize = sized + "px";
        }
        el.style.whiteSpace = "";
      };

      setText(".badge", v.badge);

      var h = document.querySelector(".headline");
      if (h) {
        h.textContent = "";
        var addPlain = function (t, cls) {
          if (!t) return;
          var sp = document.createElement("span"); sp.className = cls; sp.textContent = " " + t + " ";
          h.appendChild(sp);
        };
        var addGrad = function (t, from, to) {
          var sp = document.createElement("span"); sp.className = "grad"; sp.textContent = t;
          gradStyle(sp, from, to); h.appendChild(sp);
        };
        addPlain(v.pre, "pre");
        if (L.label) addGrad(String(L.label), LF, LT);
        var vs = document.createElement("span"); vs.className = "vs"; vs.textContent = v.vs != null ? String(v.vs) : "vs"; h.appendChild(vs);
        if (R.label) addGrad(String(R.label), RF, RT);
        addPlain(v.post, "post");
      }

      var buildCard = function (sel, data, from, to) {
        var card = document.querySelector(sel);
        if (!card) return;
        if (data.win) card.classList.add("is-win");
        if (data.icon) {
          var ic = document.createElement("div"); ic.className = "ic"; ic.textContent = String(data.icon); card.appendChild(ic);
        }
        var lbl = document.createElement("div"); lbl.className = "lbl grad"; lbl.textContent = data.label != null ? String(data.label) : "";
        gradStyle(lbl, from, to); card.appendChild(lbl); fitLbl(lbl, 110, 36);
        var bullets = Array.isArray(data.bullets) ? data.bullets : [];
        if (bullets.length) {
          var bw = document.createElement("div"); bw.className = "bullets";
          bullets.forEach(function (b) {
            var bz = document.createElement("div"); bz.className = "bz"; bz.textContent = String(b); bw.appendChild(bz);
          });
          card.appendChild(bw);
        }
        if (data.win) {
          var w = document.createElement("div"); w.className = "win"; w.textContent = typeof data.win === "string" ? data.win : "WIN"; card.appendChild(w);
        }
      };
      buildCard(".card.left", L, LF, LT);
      buildCard(".card.right", R, RF, RT);

      var statsEl = document.querySelector(".stats");
      if (statsEl && (L.stat || R.stat)) {
        var buildStat = function (cls, data, from, to) {
          var st = document.createElement("div"); st.className = "stat " + cls;
          var sv = document.createElement("div"); sv.className = "sv grad"; sv.textContent = data.stat != null ? String(data.stat) : "";
          gradStyle(sv, from, to);
          var sl = document.createElement("div"); sl.className = "sl"; sl.textContent = data.stat_label != null ? String(data.stat_label) : "";
          st.appendChild(sv); st.appendChild(sl); return st;
        };
        statsEl.appendChild(buildStat("left", L, LF, LT));
        statsEl.appendChild(buildStat("right", R, RF, RT));
      } else if (statsEl) {
        statsEl.style.display = "none";
      }
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
  </script>
</body>
</html>
