<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>CT Outro · Portrait 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700;900&display=swap" rel="stylesheet" />
<style>
  /*
   * ct-outro — ChuyenTin branded end-card / outro. Portrait 9:16 (1080×1920).
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  #root {
    position: relative;
    width: 1080px; height: 1920px;
    overflow: hidden;
    background: #ffffff;
    color: #1a1440;
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
  }

  .bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, #f0edf8 0%, #ffffff 65%);
    background-size: 200% 200%;
    animation: bgShift 12s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes bgShift {
    from { background-position: 0% 30%; }
    to { background-position: 100% 70%; }
  }

  /* ── Vignette overlay ── */
  #root::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(10, 5, 20, 0.18) 100%);
    z-index: 99; pointer-events: none;
  }

  /* ── Camera push-in ── */
  #root {
    animation: pushIn 5s linear forwards;
  }
  @keyframes pushIn {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }

  /* ── Central glow ── */
  .glow-center {
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(119, 38, 182, 0.22) 0%, transparent 65%);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
  }

  .glow-gold {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 190, 43, 0.1) 0%, transparent 70%);
    bottom: 100px; left: -100px;
    z-index: 1;
  }

  /* ── Top accent bar ── */
  .accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(to right, #7726B6, #F5BE2B, #9B4DE8);
    z-index: 10;
    transform: scaleX(0);
    transform-origin: left;
    animation: barIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.05s forwards;
  }
  @keyframes barIn { to { transform: scaleX(1); } }

  /* ── Logo mark ── */
  .logo-mark {
    position: absolute;
    top: 320px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade 0.6s ease-out 0.2s forwards;
  }
  .logo-ring {
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 9px solid transparent;
    border-top-color: #F5BE2B;
    border-right-color: #7726B6;
    border-bottom-color: #9B4DE8;
    border-left-color: transparent;
    animation: spin 2s linear infinite;
    position: relative;
  }
  .logo-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 176px; height: 176px;
    border-radius: 44px;
    box-shadow: 0 10px 40px rgba(119, 38, 182, 0.5);
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── Content ── */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 80px;
    padding-top: 480px;
    z-index: 10;
  }

  .badge {
    display: inline-block;
    background: rgba(245, 190, 43, 0.12);
    border: 1px solid rgba(245, 190, 43, 0.5);
    color: #F5BE2B;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 5px;
    text-transform: uppercase;
    padding: 12px 36px;
    border-radius: 100px;
    opacity: 0;
    animation: fadeUp 0.5s ease-out 0.4s forwards;
    margin-bottom: 40px;
  }

  .brand-name {
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 900;
    font-size: 120px;
    line-height: 1.05;
    color: #1a1440;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(50px);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    margin-bottom: 36px;
  }


  .tagline {
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.55;
    color: rgba(26, 20, 48, 0.6);
    max-width: 800px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease-out 1.0s forwards;
  }

  /* ── Rule ── */
  .rule {
    position: absolute;
    bottom: 120px; left: 50%;
    transform: translateX(-50%);
    height: 2px;
    width: 0;
    background: linear-gradient(to right, transparent, #F5BE2B, #7726B6, transparent);
    z-index: 10;
    animation: ruleGrow 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
  }
  @keyframes ruleGrow { to { width: 700px; } }

  /* ── Footer URL ── */
  .footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 10;
    opacity: 0;
    animation: fade 0.5s ease-out 1.3s forwards;
  }
  .footer-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #7726B6;
  }
  .footer-url {
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: 2px;
    color: #9B4DE8;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade { to { opacity: 1; } }

  /* ChuyenTin dark preview palette override */
  html, body { background: #05020a; }
  #root { background: #191127 !important; color: #FFFFFF !important; }
  .bg { background: linear-gradient(145deg, #191127 0%, #1A0A2E 48%, #2A1045 100%) !important; }
  .brand-name { color: #FFFFFF !important; }
  .tagline { color: rgba(255,255,255,.78) !important; }
  .footer-url { color: #F5BE2B !important; }
  .footer-dot { background: #F5BE2B !important; }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="5"
    data-width="1080"
    data-height="1920"
    data-composition-variables='{"brand_name":"ChuyenTin","tagline":"Luyện thi chuyên tin mỗi ngày","primary_url":"chuyentin.com"}'
  >
    <div class="bg"></div>
    <div class="glow-center"></div>
    <div class="glow-gold"></div>
    <div class="accent-top"></div>

    <div class="logo-mark">
      <div class="logo-ring"></div>
      <img class="logo-inner" src="capture/assets/logo.webp" alt="ChuyenTin Logo" />
    </div>

    <div class="content">
      <div class="badge"></div>
      <div class="brand-name" data-text=""></div>
      <div class="tagline"></div>
    </div>

    <div class="rule"></div>
    <div class="footer">
      <div class="footer-dot"></div>
      <span class="footer-url"></span>
      <div class="footer-dot"></div>
    </div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes && typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var bn = document.querySelector(".brand-name");
      if (bn && v.brand_name) {
        bn.textContent = v.brand_name;
        bn.setAttribute("data-text", v.brand_name);
      }
      var set = function (sel, text) {
        var el = document.querySelector(sel);
        if (el && text != null) el.textContent = String(text);
      };
      set(".tagline", v.tagline);
      set(".footer-url", v.primary_url);
      set(".badge", v.cta != null ? v.cta : "Theo dõi ngay");
    })();

    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function(){}, seek: function(){}, paused: function(){ return true; } };
  </script>
</body>
</html>
