<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #eef1f6; }
  #root {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    padding: 64px 56px 52px; color: #131722;
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
    background:
      radial-gradient(circle at 18% 8%, rgba(36, 99, 235, .20), transparent 34%),
      radial-gradient(circle at 86% 10%, rgba(245, 190, 43, .22), transparent 26%),
      linear-gradient(145deg, #f8fafc 0%, #e9eef6 42%, #f5f7fb 100%);
  }
  #root::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .26;
    background-image:
      linear-gradient(rgba(19, 23, 34, .045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(19, 23, 34, .045) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .shell { position: relative; z-index: 1; height: 100%; display: grid; grid-template-rows: auto 820px 1fr auto; gap: 24px; }
  .topbar { display: flex; align-items: end; justify-content: space-between; gap: 28px; }
  .badge {
    max-width: 610px; padding: 12px 18px; border-radius: 999px;
    font: 800 22px/1 'JetBrains Mono', monospace; letter-spacing: .08em; color: #0d2a56;
    background: rgba(255,255,255,.76); border: 1.5px solid rgba(13,42,86,.14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 20px 70px rgba(30,41,59,.10);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .brand {
    font: 800 26px/1 'Quicksand', sans-serif; letter-spacing: .02em; color: #151b2d;
  }
  .brand span { color: #2456d6; }
  .stage-shell, .panel-shell {
    border-radius: 34px; padding: 8px; background: rgba(255,255,255,.52);
    border: 1px solid rgba(255,255,255,.9);
    box-shadow: 0 34px 100px rgba(51,65,85,.16), inset 0 1px 0 rgba(255,255,255,.86);
  }
  .stage {
    height: 100%; border-radius: 28px; position: relative; overflow: hidden;
    background:
      linear-gradient(180deg, rgba(255,255,255,.94), rgba(245,247,252,.88)),
      radial-gradient(circle at 50% 32%, rgba(36,86,214,.14), transparent 48%);
    border: 1px solid rgba(20,32,54,.08);
  }
  .stage-head { position: absolute; left: 34px; top: 30px; z-index: 4; }
  .stage-kicker { font: 700 16px/1 'JetBrains Mono', monospace; letter-spacing: .16em; color: #64748b; }
  .stage-title { margin-top: 10px; font: 900 54px/.95 'Quicksand', sans-serif; color: #101828; }
  .status-card {
    position: absolute; left: 34px; right: 34px; bottom: 30px; z-index: 4;
    border-radius: 24px; padding: 22px 26px;
    background: rgba(11, 27, 54, .92); color: #f8fafc;
    box-shadow: 0 22px 64px rgba(15,23,42,.22), inset 0 1px 0 rgba(255,255,255,.12);
    font-size: 27px; font-weight: 800; line-height: 1.25;
  }
  .tree-zone { position: absolute; inset: 132px 28px 132px; }
  .tree-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .tree-line {
    stroke: rgba(74, 85, 104, .34); stroke-width: 5; stroke-linecap: round;
  }
  .tree-line.new {
    stroke: #2456d6; stroke-dasharray: 1; stroke-dashoffset: 1;
    animation: drawLine 900ms cubic-bezier(.32,.72,0,1) forwards;
  }
  .tree-line.visited { stroke: rgba(36, 86, 214, .58); }
  .tree-node {
    position: absolute; width: 86px; height: 86px; border-radius: 50%;
    transform: translate(-50%, -50%);
    display: grid; place-items: center;
    font: 900 31px/1 'Quicksand', sans-serif; color: #172033;
    background:
      radial-gradient(circle at 32% 24%, rgba(255,255,255,.96), rgba(255,255,255,.62) 36%, rgba(226,232,240,.96) 100%);
    border: 1.5px solid rgba(15,23,42,.12);
    box-shadow: inset 0 2px 2px rgba(255,255,255,.9), 0 16px 38px rgba(51,65,85,.20);
  }
  .tree-node.visited { background: linear-gradient(180deg, #eef4ff, #dce8ff); border-color: rgba(36,86,214,.24); }
  .tree-node.current {
    color: #07152f; border-color: rgba(245,190,43,.78);
    box-shadow: inset 0 2px 2px rgba(255,255,255,.9), 0 0 0 9px rgba(245,190,43,.15), 0 22px 58px rgba(36,86,214,.20);
    animation: breathe 1600ms cubic-bezier(.32,.72,0,1) infinite;
  }
  .tree-node.new {
    opacity: 0; animation: nodeIn 820ms cubic-bezier(.16,1,.3,1) forwards;
  }
  .order {
    position: absolute; right: -8px; top: -8px; width: 28px; height: 28px;
    border-radius: 50%; display: grid; place-items: center;
    background: #2456d6; color: white; font: 800 13px/1 'JetBrains Mono', monospace;
  }
  .lower { display: grid; grid-template-columns: 1.12fr .88fr; gap: 22px; min-height: 0; }
  .panel { height: 100%; border-radius: 28px; padding: 22px; background: rgba(255,255,255,.82); border: 1px solid rgba(20,32,54,.08); overflow: hidden; }
  .panel-label { font: 800 15px/1 'JetBrains Mono', monospace; letter-spacing: .14em; color: #64748b; margin-bottom: 14px; }
  .code-lines { font-family: 'JetBrains Mono', monospace; font-size: 20px; line-height: 1.58; }
  .code-row { display: grid; grid-template-columns: 38px 1fr; gap: 12px; padding: 3px 8px; border-radius: 10px; }
  .code-row.active { background: #12213d; color: #f8fafc; box-shadow: 0 12px 28px rgba(18,33,61,.14); }
  .ln { color: #94a3b8; text-align: right; }
  .cd { color: #1f2937; white-space: pre; }
  .active .ln, .active .cd { color: #f8fafc; }
  .vars { display: flex; flex-direction: column; gap: 10px; }
  .var {
    display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px;
    border-radius: 18px; padding: 14px 16px; background: #f1f5f9; border: 1px solid rgba(36,86,214,.10);
  }
  .var.changed { background: #fff7df; border-color: rgba(245,190,43,.45); }
  .var-name { font-size: 22px; font-weight: 800; color: #1e3a5f; }
  .var-val { font: 800 21px/1.1 'JetBrains Mono', monospace; color: #0f172a; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
  .progress { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; }
  .step { font: 800 20px/1 'JetBrains Mono', monospace; color: #334155; }
  .track { height: 10px; border-radius: 999px; background: rgba(15,23,42,.08); overflow: hidden; }
  .bar { height: 100%; width: 0%; border-radius: inherit; background: linear-gradient(90deg, #2456d6, #f5be2b); }
  .output-order {
    position: absolute; right: 30px; top: 34px; z-index: 5;
    max-width: 410px; border-radius: 20px; padding: 14px 16px;
    background: rgba(255,255,255,.78); border: 1px solid rgba(15,23,42,.08);
    font: 800 18px/1.25 'JetBrains Mono', monospace; color: #2456d6;
  }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes nodeIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(.58); filter: blur(10px); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
  }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.06); }
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
    <div class="shell">
      <header class="topbar">
        <div class="badge" id="badge">TREE TRACE</div>
        <div class="brand">Chuyen<span>Tin</span></div>
      </header>
      <section class="stage-shell">
        <div class="stage">
          <div class="stage-head">
            <div class="stage-kicker">BINARY SEARCH TREE</div>
            <div class="stage-title" id="stage-title">Tree Sort</div>
          </div>
          <div class="output-order" id="order-box" style="display:none"></div>
          <div class="tree-zone" id="tree-zone"></div>
          <div class="status-card" id="status">Đang thực hiện...</div>
        </div>
      </section>
      <section class="lower">
        <div class="panel-shell"><div class="panel"><div class="panel-label">ACTIVE CODE</div><div class="code-lines" id="code"></div></div></div>
        <div class="panel-shell"><div class="panel"><div class="panel-label">STATE INSPECTOR</div><div class="vars" id="vars"></div></div></div>
      </section>
      <footer class="progress">
        <div class="step" id="step-left">STEP 1</div>
        <div class="track"><div class="bar" id="bar"></div></div>
        <div class="step" id="step-right">1 / 4</div>
      </footer>
    </div>
  </div>
  <script>
    (function () {
      var v = window.__hyperframes && typeof window.__hyperframes.getVariables === "function" ? window.__hyperframes.getVariables() : {};
      var byId = function (id) { return document.getElementById(id); };
      var badge = byId("badge");
      if (badge && v.badge) badge.textContent = String(v.badge);
      var step = typeof v.step_index === "number" ? v.step_index : 1;
      var total = typeof v.total_steps === "number" && v.total_steps > 0 ? v.total_steps : 1;
      byId("step-left").textContent = "STEP " + step;
      byId("step-right").textContent = step + " / " + total;
      byId("bar").style.width = Math.max(0, Math.min(100, step / total * 100)) + "%";
      byId("status").textContent = v.status ? String(v.status) : "Đang thực hiện...";

      var codeLines = Array.isArray(v.code_lines) ? v.code_lines : [];
      var active = typeof v.active_line_num === "number" ? v.active_line_num : -1;
      var code = byId("code");
      codeLines.slice(0, 13).forEach(function (row) {
        var n = typeof row === "object" ? row.n : "";
        var t = typeof row === "object" ? row.t : String(row);
        var el = document.createElement("div");
        el.className = "code-row" + (n === active ? " active" : "");
        el.innerHTML = '<span class="ln">' + n + '</span><span class="cd"></span>';
        el.querySelector(".cd").textContent = (n === active ? "▶ " : "  ") + t;
        code.appendChild(el);
      });

      var vars = byId("vars");
      (Array.isArray(v.variables) ? v.variables : []).slice(0, 5).forEach(function (item) {
        var row = document.createElement("div");
        row.className = "var" + (item && item.changed ? " changed" : "");
        var name = item && item.name ? item.name : "";
        var value = item && item.value !== undefined ? item.value : "";
        row.innerHTML = '<div class="var-name"></div><div class="var-val"></div>';
        row.querySelector(".var-name").textContent = String(name);
        row.querySelector(".var-val").textContent = String(value);
        vars.appendChild(row);
      });

      var order = Array.isArray(v.traversal_order) ? v.traversal_order : [];
      if (order.length) {
        byId("order-box").style.display = "block";
        byId("order-box").textContent = "INORDER  " + order.join("  ");
      }

      var zone = byId("tree-zone");
      var nodes = Array.isArray(v.tree_nodes) ? v.tree_nodes : [];
      var visited = Array.isArray(v.visited_ids) ? v.visited_ids : [];
      var current = v.current_id;
      var map = {};
      var root = null;
      nodes.forEach(function (n) { map[n.id] = { id: n.id, value: n.value, parent: n.parent, children: [] }; });
      nodes.forEach(function (n) {
        if (!n.parent || !map[n.parent]) { if (!root) root = map[n.id]; }
        else map[n.parent].children.push(map[n.id]);
      });
      function layout(node, x, y, spread) {
        node.x = x; node.y = y;
        if (node.children.length === 1) layout(node.children[0], x, y + 26, spread * .55);
        if (node.children.length >= 2) {
          layout(node.children[0], x - spread, y + 26, spread * .52);
          layout(node.children[1], x + spread, y + 26, spread * .52);
        }
      }
      if (root) layout(root, 50, 18, 28);
      var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", "tree-svg");
      zone.appendChild(svg);
      nodes.forEach(function (n) {
        var node = map[n.id], parent = node && map[node.parent];
        if (!node || !parent) return;
        var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", parent.x + "%"); line.setAttribute("y1", parent.y + "%");
        line.setAttribute("x2", node.x + "%"); line.setAttribute("y2", node.y + "%");
        var isNew = !visited.includes(node.id) || current === node.id;
        line.setAttribute("pathLength", "1");
        line.setAttribute("class", "tree-line" + (visited.includes(node.id) ? " visited" : "") + (isNew ? " new" : ""));
        svg.appendChild(line);
      });
      nodes.forEach(function (n, idx) {
        var node = map[n.id];
        if (!node) return;
        var isCurrent = current === n.id;
        var isVisited = visited.includes(n.id);
        var isNew = !isVisited || isCurrent;
        var el = document.createElement("div");
        el.className = "tree-node" + (isVisited ? " visited" : "") + (isCurrent ? " current" : "") + (isNew ? " new" : "");
        el.style.left = node.x + "%"; el.style.top = node.y + "%";
        el.style.animationDelay = Math.min(idx * .08, .48) + "s";
        el.textContent = String(node.value);
        var oi = order.indexOf(String(node.value));
        if (oi >= 0) {
          var b = document.createElement("div");
          b.className = "order"; b.textContent = String(oi + 1);
          el.appendChild(b);
        }
        zone.appendChild(el);
      });

      window.__timelines = window.__timelines || {};
      window.__timelines.main = { pause: function(){}, seek: function(){}, paused: function(){ return true; } };
    })();
  </script>
</body>
