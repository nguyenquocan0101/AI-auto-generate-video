<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>CT Voltage · 16:9</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&family=Dancing+Script:wght@600;700&family=Space+Mono:wght@400;700&family=Be+Vietnam+Pro:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /*
   * ct-voltage — ChuyenTin branded creative voltage slide. 16:9 landscape.
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #ffffff; }
  #root {
    position: relative; width: 1920px; height: 1080px; background: #ffffff; color: #1a1440;
    font-family: 'Quicksand', sans-serif;
  }

  #root::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(10, 5, 20, 0.18) 100%);
    z-index: 99; pointer-events: none;
  }

  /* left purple panel, right navy panel */
  .panel-l {
    position: absolute; left: 0; top: 0; bottom: 0; width: 47%;
    background: linear-gradient(145deg, #ffffff 0%, #f0edf8 40%, #7726B6 100%);
    transform: translateX(-100%); animation: slideL 0.85s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
  }
  .panel-r {
    position: absolute; right: 0; top: 0; bottom: 0; width: 53%;
    background: #ffffff;
    transform: translateX(100%); animation: slideR 0.85s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
  }
  @keyframes slideL { to { transform: translateX(0); } }
  @keyframes slideR { to { transform: translateX(0); } }

  .glow {
    position: absolute; left: 0; top: 0; bottom: 0; width: 47%; z-index: 1; pointer-events: none;
    background: radial-gradient(circle at 30% 40%, rgba(245, 190, 43, 0.16) 0%, transparent 55%); opacity: 0;
    animation: fade 1.2s ease-out 0.9s forwards;
  }
  @keyframes fade { to { opacity: 1; } }

  .display {
    position: absolute; right: 110px; top: 300px; width: 820px; text-align: right; z-index: 4;
    font-family: 'Quicksand', sans-serif; font-weight: 900; font-size: 124px; line-height: 1.0; letter-spacing: -3px;
  }
  .display .ln {
    display: block; opacity: 0; transform: translateY(34px);
    animation: up 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .display .volt {
    color: #F5BE2B;
  }
  @keyframes up { to { opacity: 1; transform: translateY(0); } }

  .script {
    position: absolute; left: 90px; top: 430px; z-index: 4; font-family: 'Dancing Script', cursive;
    font-weight: 700; font-size: 150px; line-height: 0.9; color: #F5BE2B; opacity: 0; transform: rotate(-7deg);
    animation: scriptIn 0.8s ease-out 1.4s forwards;
    text-shadow: 0 0 40px rgba(245, 190, 43, 0.4);
  }
  @keyframes scriptIn {
    0% { opacity: 0; transform: rotate(-7deg) translateY(20px) scale(0.9); }
    100% { opacity: 1; transform: rotate(-7deg) translateY(0) scale(1); }
  }
  .script-underline { position: absolute; left: 90px; top: 600px; z-index: 4; }
  .script-underline path {
    stroke: url(#uline-grad); stroke-width: 6; fill: none; stroke-linecap: round;
    stroke-dasharray: 600; stroke-dashoffset: 600; animation: draw 0.9s ease-out 1.9s forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .meta {
    position: absolute; left: 90px; top: 96px; z-index: 4; font-family: 'Space Mono', monospace;
    font-size: 18px; font-weight: 700; letter-spacing: 3px; color: rgba(26,20,48,0.85);
    opacity: 0; animation: fade 0.6s ease-out 1.0s forwards;
  }

  .caption {
    position: absolute; right: 110px; bottom: 96px; z-index: 4; font-family: 'Space Mono', monospace;
    font-size: 18px; font-weight: 400; letter-spacing: 2px; color: rgba(26, 20, 48, 0.55);
    opacity: 0; animation: fade 0.6s ease-out 2.2s forwards;
  }
  /* ChuyenTin dark preview palette override */
  html, body { background: #05020a; }
  #root { background: #191127 !important; color: #FFFFFF !important; }
  .panel-t { background: linear-gradient(145deg, #191127 0%, #1A0A2E 52%, #7726B6 100%) !important; }
  .panel-b { background: linear-gradient(180deg, #2A1045 0%, #191127 100%) !important; }
  .display .ln { color: #FFFFFF; }
  .display .volt, .script { color: #F5BE2B !important; }
  .caption { color: rgba(255,255,255,.74) !important; }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="uline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#F5BE2B" />
          <stop offset="100%" stop-color="#7726B6" />
        </linearGradient>
      </defs>
    </svg>

    <div class="panel-l"></div>
    <div class="panel-r"></div>
    <div class="glow"></div>

    <div class="meta"></div>

    <div class="display"></div>

    <div class="script"></div>
    <svg class="script-underline" width="520" height="60" viewBox="0 0 520 60" fill="none">
      <path d="M8 40 C 140 12, 360 12, 512 34"/>
    </svg>

    <div class="caption"></div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes && typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      
      var set = function (sel, text) {
        var el = document.querySelector(sel);
        if (el && text != null) el.textContent = String(text);
      };

      set(".meta", v.meta);
      set(".script", v.script);
      set(".caption", v.caption);

      var lines = Array.isArray(v.display_lines) ? v.display_lines : [];
      var ai = typeof v.accent_index === "number" ? v.accent_index : 1;
      var disp = document.querySelector(".display");
      if (disp) {
        disp.textContent = "";
        lines.slice(0, 3).forEach(function (ln, i) {
          var span = document.createElement("span");
          span.className = "ln" + (i === ai ? " volt" : "");
          span.textContent = ln;
          span.style.animationDelay = (0.5 + i * 0.15).toFixed(2) + "s";
          disp.appendChild(span);
        });
      }
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function(){}, seek: function(){}, paused: function(){ return true; } };
  </script>
</body>
</html>
