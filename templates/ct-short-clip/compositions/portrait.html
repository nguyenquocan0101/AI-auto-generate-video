<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080,height=1920" />
  <title>CT Short Clip · Portrait</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main id="root" data-composition-id="main" data-start="0" data-duration="24" data-width="1080" data-height="1920">
    <div class="grid"></div>
    <div class="glow"></div>
    <section class="brand-intro" id="brand-intro" aria-label="Chuyentin.com intro">
      <div class="brand-backdrop" id="brand-backdrop"></div>
      <div class="brand-aura" id="brand-aura"></div>
      <div class="brand-mark-shell" id="brand-intro-mark"><div class="brand-mark-core"><img src="../assets/logo.webp" alt="Chuyentin.com" /></div></div>
      <div class="brand-intro-copy" id="brand-intro-copy">
        <div class="brand-name">Chuyentin.com</div>
        <div class="brand-slogan">Khởi đầu từ tư duy, thành công bằng năng lực.</div>
        <div class="brand-link">CHUYENTIN.COM <span>·</span> ALGORITHM LAB</div>
      </div>
    </section>
    <section class="brand-outro" id="brand-outro" aria-label="Chuyentin.com outro">
      <div class="outro-line"></div>
      <div class="outro-mark-space" aria-hidden="true"></div>
      <div class="outro-name">Chuyentin.com</div>
      <div class="outro-slogan">Khởi đầu từ tư duy, thành công bằng năng lực.</div>
      <div class="outro-link">Chuyentin.com</div>
    </section>
    <div class="content">
      <header class="hero">
        <div class="eyebrow">Algorithm · Live trace</div>
        <h1 id="title">Bubble Sort</h1>
        <p class="subtitle" id="subtitle"></p>
        <div class="metrics">
          <span class="metric">Time:<b id="time"></b></span>
          <span class="metric">Space:<b id="space"></b></span>
        </div>
      </header>
      <section class="chart-panel">
        <div class="bars" id="bars"></div>
        <div class="chart-baseline"></div>
      </section>
      <section class="code-panel">
        <div class="terminal"><i></i><i></i><i></i><span>algorithm.js</span></div>
        <div class="code" id="code"></div>
      </section>
      <footer class="footer">
        <div class="status" id="status">Mảng ban đầu</div>
        <div class="step" id="step">00 / 00</div>
        <div class="progress"><span id="progress"></span></div>
      </footer>
    </div>
  </main>
  <script>window.__timelines = window.__timelines || {}; window.__timelines.main = { pause: function(){}, seek: function(){}, paused: function(){ return true; } };</script>
  <script src="../runtime.js"></script>
</body>
</html>
