
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{background:#0e0b1a;border-radius:16px;padding:16px;font-family:var(--font-mono,monospace);max-width:360px;margin:0 auto;color:#c9c3e0}
.badge{display:inline-block;border:1px solid #b98a3a;color:#e2b878;font-size:11px;padding:3px 14px;border-radius:999px;letter-spacing:.04em;margin-bottom:10px;font-family:var(--font-sans)}
.panel{background:#1a1430;border-radius:10px;padding:10px 12px;margin-bottom:10px}
.panel-label{font-family:var(--font-sans);font-size:10px;letter-spacing:.08em;color:#7a74a0;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.code-lines{font-size:11.5px;line-height:1.8}
.code-row{display:flex;gap:8px;padding:0 0 0 4px;border-left:3px solid transparent;border-radius:0;transition:background .25s,border-color .25s}
.code-row.active{background:#25194a;border-left-color:#e2b878}
.code-row .ln{color:#4a4560;width:16px;text-align:right;flex-shrink:0}
.code-row .cd{color:#8b87a3;white-space:pre}
.code-row.active .cd{color:#f0e8d0}
.marker{color:#e2b878;font-size:10px;margin-right:4px}

.arr-strip{display:flex;gap:7px;justify-content:center;padding:6px 0}
.arr-cell{width:38px;height:38px;border-radius:8px;background:#241a3d;border:1.5px solid #3a305e;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#c9c3e0;transition:background .25s,border-color .25s,transform .25s;position:relative;flex-direction:column}
.arr-cell.hi{border-color:#e2b878;background:#2c2050;color:#f5e6c0}
.arr-cell.swap{animation:swapPop .35s ease}
.arr-ptr{font-size:8px;color:#e2b878;margin-top:1px;font-family:var(--font-sans)}
.arr-ptr.empty{opacity:0}
@keyframes swapPop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}

.var-rows{font-size:12px;display:flex;flex-direction:column;gap:4px}
.var-row{display:flex;justify-content:space-between;align-items:center;padding:3px 6px;border-radius:5px;transition:background .25s}
.var-row.changed{background:#2e1a30}
.var-name{color:#b8b2d0}
.var-val{color:#f0e8d0;font-weight:500}
.var-val .old{color:#7a6880;text-decoration:line-through;margin-right:4px;font-size:10px}
.var-val .arrow{color:#b98a3a;margin:0 3px;font-size:10px}

.caption{font-family:var(--font-sans);font-size:12px;color:#b98a3a;text-align:center;padding:4px 0 2px;min-height:22px;transition:opacity .2s}

.controls{display:flex;gap:8px;justify-content:center;margin-top:10px}
.btn{font-family:var(--font-sans);font-size:12px;padding:6px 18px;border-radius:999px;border:1px solid #3a305e;background:#1a1430;color:#c9c3e0;cursor:pointer;transition:background .15s}
.btn:hover{background:#25194a}
.btn.primary{border-color:#b98a3a;color:#e2b878}
.btn:disabled{opacity:.35;cursor:default}
.progress{height:2px;background:#241a3d;border-radius:2px;margin-top:12px;overflow:hidden}
.progress-bar{height:100%;background:#e2b878;border-radius:2px;transition:width .3s}
</style>

<h2 class="sr-only">Bubble Sort visualization step-by-step, giống Python Tutor, layout dọc</h2>
<div id="app">
  <div style="text-align:center"><div class="badge" id="badge">BƯỚC 1 · DÒNG 7</div></div>
  <div class="panel">
    <div class="panel-label"><i class="ti ti-device-laptop" style="font-size:13px" aria-hidden="true"></i> CODE — bubbleSort()</div>
    <div class="code-lines" id="code-block"></div>
  </div>
  <div class="panel" style="padding:8px 12px">
    <div class="panel-label"><i class="ti ti-layout-list" style="font-size:13px" aria-hidden="true"></i> MẢNG</div>
    <div class="arr-strip" id="arr-strip"></div>
  </div>
  <div class="panel">
    <div class="panel-label"><i class="ti ti-variable" style="font-size:13px" aria-hidden="true"></i> BIẾN</div>
    <div class="var-rows" id="var-rows"></div>
  </div>
  <div class="caption" id="caption"></div>
  <div class="controls">
    <button class="btn" id="btn-prev" disabled>← Trước</button>
    <button class="btn primary" id="btn-next">Tiếp →</button>
  </div>
  <div class="progress"><div class="progress-bar" id="prog"></div></div>
</div>

<script>
const CODE=[
  {n:6,t:"for (int i=0; i<n-1; i++) {"},
  {n:7,t:"  for (int j=0; j<n-i-1; j++) {"},
  {n:8,t:"    if (arr[j] > arr[j+1]) {"},
  {n:9,t:"      swap(arr[j], arr[j+1]);"},
  {n:10,t:"    }"},
  {n:11,t:"  }"},
];

const STEPS=[
  {badge:"VÒNG 1 · DÒNG 6",line:6,arr:[5,3,8,4,2],hi:[],ptrs:{},vars:{i:"0",j:"-",n:"5"},changed:[],caption:"Bắt đầu vòng lặp ngoài, i = 0"},
  {badge:"BƯỚC 1 · DÒNG 7",line:7,arr:[5,3,8,4,2],hi:[0,1],ptrs:{0:"j",1:"j+1"},vars:{i:"0",j:"0",n:"5"},changed:["j"],caption:"So sánh vị trí 0 và 1"},
  {badge:"BƯỚC 2 · DÒNG 8",line:8,arr:[5,3,8,4,2],hi:[0,1],ptrs:{0:"j",1:"j+1"},vars:{i:"0",j:"0",n:"5"},changed:[],caption:"5 > 3 → đúng, cần hoán đổi"},
  {badge:"BƯỚC 3 · DÒNG 9",line:9,arr:[3,5,8,4,2],hi:[0,1],ptrs:{0:"j",1:"j+1"},vars:{i:"0",j:"0",n:"5"},changed:["arr[0]","arr[1]"],prevVals:{"arr[0]":"5","arr[1]":"3"},caption:"Hoán đổi 5 và 3",swap:[0,1]},
  {badge:"BƯỚC 4 · DÒNG 7",line:7,arr:[3,5,8,4,2],hi:[1,2],ptrs:{1:"j",2:"j+1"},vars:{i:"0",j:"1",n:"5"},changed:["j"],caption:"j tiến lên 1, so sánh vị trí 1 và 2"},
  {badge:"BƯỚC 5 · DÒNG 8",line:8,arr:[3,5,8,4,2],hi:[1,2],ptrs:{1:"j",2:"j+1"},vars:{i:"0",j:"1",n:"5"},changed:[],caption:"5 < 8 → không hoán đổi"},
  {badge:"BƯỚC 6 · DÒNG 7",line:7,arr:[3,5,8,4,2],hi:[2,3],ptrs:{2:"j",3:"j+1"},vars:{i:"0",j:"2",n:"5"},changed:["j"],caption:"j = 2, so sánh vị trí 2 và 3"},
  {badge:"BƯỚC 7 · DÒNG 8",line:8,arr:[3,5,8,4,2],hi:[2,3],ptrs:{2:"j",3:"j+1"},vars:{i:"0",j:"2",n:"5"},changed:[],caption:"8 > 4 → cần hoán đổi"},
  {badge:"BƯỚC 8 · DÒNG 9",line:9,arr:[3,5,4,8,2],hi:[2,3],ptrs:{2:"j",3:"j+1"},vars:{i:"0",j:"2",n:"5"},changed:["arr[2]","arr[3]"],prevVals:{"arr[2]":"8","arr[3]":"4"},caption:"Hoán đổi 8 và 4",swap:[2,3]},
  {badge:"BƯỚC 9 · DÒNG 7",line:7,arr:[3,5,4,8,2],hi:[3,4],ptrs:{3:"j",4:"j+1"},vars:{i:"0",j:"3",n:"5"},changed:["j"],caption:"j = 3, so sánh vị trí 3 và 4"},
  {badge:"BƯỚC 10 · DÒNG 8",line:8,arr:[3,5,4,8,2],hi:[3,4],ptrs:{3:"j",4:"j+1"},vars:{i:"0",j:"3",n:"5"},changed:[],caption:"8 > 2 → hoán đổi"},
  {badge:"BƯỚC 11 · DÒNG 9",line:9,arr:[3,5,4,2,8],hi:[3,4],ptrs:{3:"j",4:"j+1"},vars:{i:"0",j:"3",n:"5"},changed:["arr[3]","arr[4]"],prevVals:{"arr[3]":"8","arr[4]":"2"},caption:"Hoán đổi 8 và 2 — 8 đến đúng vị trí!",swap:[3,4]},
  {badge:"LƯỢT 2 · DÒNG 6",line:6,arr:[3,5,4,2,8],hi:[],ptrs:{},vars:{i:"1",j:"-",n:"5"},changed:["i"],caption:"Lượt 2 bắt đầu, i = 1"},
  {badge:"LƯỢT 2 · DÒNG 7",line:7,arr:[3,5,4,2,8],hi:[0,1],ptrs:{0:"j",1:"j+1"},vars:{i:"1",j:"0",n:"5"},changed:["j"],caption:"So sánh vị trí 0 và 1"},
  {badge:"LƯỢT 2 · DÒNG 8",line:8,arr:[3,5,4,2,8],hi:[0,1],ptrs:{0:"j",1:"j+1"},vars:{i:"1",j:"0",n:"5"},changed:[],caption:"3 < 5 → không hoán đổi"},
  {badge:"LƯỢT 2 · DÒNG 7",line:7,arr:[3,5,4,2,8],hi:[1,2],ptrs:{1:"j",2:"j+1"},vars:{i:"1",j:"1",n:"5"},changed:["j"],caption:"j = 1, so sánh 5 và 4"},
  {badge:"LƯỢT 2 · DÒNG 9",line:9,arr:[3,4,5,2,8],hi:[1,2],ptrs:{1:"j",2:"j+1"},vars:{i:"1",j:"1",n:"5"},changed:["arr[1]","arr[2]"],prevVals:{"arr[1]":"5","arr[2]":"4"},caption:"Hoán đổi 5 và 4",swap:[1,2]},
  {badge:"KẾT QUẢ",line:6,arr:[2,3,4,5,8],hi:[0,1,2,3,4],ptrs:{},vars:{i:"4",j:"-",n:"5"},changed:[],caption:"Mảng đã được sắp xếp!"},
];

let cur=0;
const arrState=[5,3,8,4,2];

function render(idx,animate){
  const s=STEPS[idx];
  document.getElementById("badge").textContent=s.badge;
  document.getElementById("prog").style.width=(((idx)/(STEPS.length-1))*100)+"%";

  const cb=document.getElementById("code-block");
  cb.innerHTML="";
  CODE.forEach(row=>{
    const d=document.createElement("div");
    d.className="code-row"+(row.n===s.line?" active":"");
    d.innerHTML=`<span class="ln">${row.n}</span><span class="cd">${row.n===s.line?'<span class="marker">▶</span>':' \u00a0\u00a0'}${row.t}</span>`;
    cb.appendChild(d);
  });

  const strip=document.getElementById("arr-strip");
  strip.innerHTML="";
  s.arr.forEach((v,i)=>{
    const cell=document.createElement("div");
    cell.className="arr-cell"+(s.hi.includes(i)?" hi":"")+(animate&&s.swap&&s.swap.includes(i)?" swap":"");
    cell.innerHTML=`${v}<span class="arr-ptr${s.ptrs[i]?"":" empty"}">${s.ptrs[i]||"·"}</span>`;
    strip.appendChild(cell);
  });

  const vr=document.getElementById("var-rows");
  const varOrder=["i","j","n"];
  const swapVars=s.changed.filter(v=>v.startsWith("arr["));
  vr.innerHTML="";
  varOrder.forEach(k=>{
    const row=document.createElement("div");
    row.className="var-row"+(s.changed.includes(k)?" changed":"");
    row.innerHTML=`<span class="var-name">${k}</span><span class="var-val">${s.vars[k]}</span>`;
    vr.appendChild(row);
  });
  if(swapVars.length){
    swapVars.forEach(k=>{
      const row=document.createElement("div");
      row.className="var-row changed";
      const prev=s.prevVals&&s.prevVals[k];
      row.innerHTML=`<span class="var-name">${k}</span><span class="var-val">${prev?`<span class="old">${prev}</span><span class="arrow">→</span>`:""}${s.vars[k]||s.arr[parseInt(k.match(/\d+/)[0])]}</span>`;
      vr.appendChild(row);
    });
  }

  document.getElementById("caption").textContent=s.caption;
  document.getElementById("btn-prev").disabled=idx===0;
  document.getElementById("btn-next").disabled=idx===STEPS.length-1;
  document.getElementById("btn-next").textContent=idx===STEPS.length-1?"Xong ✓":"Tiếp →";
}

document.getElementById("btn-next").addEventListener("click",()=>{if(cur<STEPS.length-1){cur++;render(cur,true);}});
document.getElementById("btn-prev").addEventListener("click",()=>{if(cur>0){cur--;render(cur,false);}});

render(0,false);
</script>
