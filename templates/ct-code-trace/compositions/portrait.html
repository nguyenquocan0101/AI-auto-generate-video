<style>
  /*
   * ct-code-trace — Python Tutor-like Vertical Code & Variable Tracing
   * Optimized for 9:16 Portrait (1080×1920).
   * Features stacked panels, nested pointers, and debugger control simulation.
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #ffffff; }
  #root {
    position: relative; width: 1080px; height: 1920px; background: #ffffff; color: #3d3360;
    font-family: 'Be Vietnam Pro', system-ui, sans-serif; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 80px 60px 40px; gap: 20px;
  }

  .bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #f0edf8 0%, #ffffff 50%, #f0edf8 100%);
    background-size: 200% 200%;
    animation: bgShift 15s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes bgShift {
    from { background-position: 0% 30%; }
    to { background-position: 100% 70%; }
  }

  #root::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(10, 5, 20, 0.08) 100%);
    z-index: 99; pointer-events: none;
  }
  .glow {
    position: absolute;
    width: 1000px; height: 1000px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 190, 43, 0.06) 0%, transparent 65%);
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    z-index: 1;
  }
  .grid {
    position: absolute; inset: 0; z-index: 1; opacity: 0.03;
    background-image:
      linear-gradient(rgba(155, 77, 232, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(155, 77, 232, 0.04) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* Top accent line */
  .accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(to right, #7726B6, #F5BE2B, transparent);
    z-index: 10;
  }

  .stack-item { position: relative; z-index: 4; width: 100%; }

  /* 1. BADGE SECTION */
  .badge-container {
    display: flex; align-items: center; justify-content: center;
  }
  .badge {
    padding: 12px 32px; border-radius: 999px; font-size: 24px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: #F5BE2B; border: 1.5px solid rgba(245, 190, 43, 0.5);
    background: rgba(245, 190, 43, 0.08);
  }

  /* PANEL STYLING */
  .panel {
    background: #f5f3fc; border-radius: 20px; padding: 26px 30px;
    border: 1px solid rgba(155, 77, 232, 0.12);
    box-shadow: none;
  }
  .panel-label {
    font-family: 'Be Vietnam Pro', sans-serif; font-size: 20px; font-weight: 700;
    letter-spacing: 2px; color: #6055a0; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    text-transform: uppercase;
  }

  /* 2. CODE PANEL */
  .code-panel {
    height: 800px;
    display: flex;
    flex-direction: column;
  }
  .code-panel .code-lines {
    flex: 1;
    overflow: hidden;
  }
  .code-lines {
    font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 32px; font-weight: 400; line-height: 1.8;
    font-variant-ligatures: none;
  }
  .code-row {
    display: flex; gap: 16px; padding: 4px 12px; border-left: 4px solid transparent;
    border-radius: 6px; transition: background 0.25s, border-color 0.25s;
  }
  .code-row.active {
    background: rgba(155, 77, 232, 0.22);
    border-left-color: #F5BE2B;
    font-weight: 700;
  }
  .code-row { background: rgba(255,255,255,.02); }
  .code-row .ln { color: rgba(103,91,160,.96); width: 32px; text-align: right; flex-shrink: 0; }
  .code-row .cd { color: rgba(241,236,251,.95); white-space: pre; font-weight: 600; }
  .code-row.active { background: rgba(245,190,43,.95); }
  .code-row.active .cd { color: #100a26; }
  .marker { color: #F5BE2B; font-size: 20px; margin-right: 8px; font-weight: 900; }

  /* Syntax Highlighting Colors */
  .code-kw { color: #ff79c6; font-weight: 800; }
  .code-fn { color: #8be9fd; font-weight: 800; }
  .code-str { color: #50fa7b; }
  .code-num { color: #ffb86c; }

  /* 3. DATA PANEL (~12%) */
  .data-panel {
    min-height: 160px;
  }
  .arr-strip { display: flex; gap: 18px; justify-content: center; padding: 12px 0; }
  .arr-cell {
    width: 96px; height: 96px; border-radius: 16px; background: #ede8f8;
    border: 2px solid #c5bce8; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Be Vietnam Pro', sans-serif; font-size: 34px; font-weight: 700; color: #3d3360;
    transition: all 0.25s ease; position: relative;
  }
  .arr-cell.hi {
    border-color: #F5BE2B; background: rgba(155, 77, 232, 0.15); color: #1a1440;
    box-shadow: 0 0 20px rgba(245, 190, 43, 0.25);
  }
  .arr-val-inner { display: inline-block; transition: all 0.25s ease; }
  .arr-cell.swap-right .arr-val-inner {
    animation: swapRightAnim 1s ease-in-out 0.8s forwards;
  }
  .arr-cell.swap-left .arr-val-inner {
    animation: swapLeftAnim 1s ease-in-out 0.8s forwards;
  }

  @keyframes swapRightAnim {
    0% { transform: translateY(0) translateX(0) scale(1); }
    40% { transform: translateY(-30px) translateX(calc(var(--swap-dist) * 0.5)) scale(1.25); }
    100% { transform: translateY(0) translateX(var(--swap-dist)) scale(1); }
  }
  @keyframes swapLeftAnim {
    0% { transform: translateY(0) translateX(0) scale(1); }
    40% { transform: translateY(30px) translateX(calc(var(--swap-dist) * -0.5)) scale(1.25); }
    100% { transform: translateY(0) translateX(calc(var(--swap-dist) * -1)) scale(1); }
  }

  .arr-ptr {
    font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: 900; color: #F5BE2B;
    margin-top: 4px; text-transform: uppercase;
  }
  .arr-ptr.empty { opacity: 0; }

  /* Linked List CSS */
  .list-strip {
    display: flex; gap: 14px; justify-content: center; align-items: center; padding: 12px 0;
    flex-wrap: wrap;
  }
  .list-node {
    position: relative; display: flex; flex-direction: column; align-items: center;
    background: #ede8f8; border: 2.5px solid #c5bce8; border-radius: 12px;
    width: 110px; height: 80px; font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.25s ease;
  }
  .list-node.hi {
    border-color: #F5BE2B; background: rgba(155, 77, 232, 0.15);
    box-shadow: 0 0 20px rgba(245, 190, 43, 0.25);
  }
  .node-val {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #3d3360;
  }
  .node-next {
    width: 100%; border-top: 1.5px solid #c5bce8; text-align: center;
    font-size: 16px; font-weight: 600; color: #6055a0; background: rgba(155, 77, 232, 0.05);
    padding: 2px 0; border-radius: 0 0 10px 10px;
  }
  .list-arrow {
    font-size: 32px; font-weight: 900; color: #7726B6; margin: 0 4px;
    transition: all 0.3s ease;
  }
  .list-arrow.changed-link {
    color: #F5BE2B;
    animation: arrowGlow 1.5s infinite alternate;
  }
  @keyframes arrowGlow {
    0% { text-shadow: 0 0 5px rgba(245, 190, 43, 0.3); }
    100% { text-shadow: 0 0 15px rgba(245, 190, 43, 0.8); }
  }
  .list-node-ptr {
    position: absolute; bottom: -38px; font-family: 'Courier New', monospace;
    font-size: 16px; font-weight: 900; color: #F5BE2B; text-transform: uppercase;
  }

  /* Tree CSS */
  .tree-container {
    position: relative; width: 100%; height: 280px; margin: 10px 0;
  }
  .tree-node {
    position: absolute; width: 68px; height: 68px; border-radius: 50%;
    background: #ede8f8; border: 2.5px solid #c5bce8; display: flex;
    align-items: center; justify-content: center; font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 26px; font-weight: 700; color: #3d3360; transform: translate(-50%, -50%);
    transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .tree-node.appear {
    opacity: 0;
    animation: treeNodeIn 0.75s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    animation-delay: calc(var(--tree-order, 0) * 0.12s);
  }
  .tree-node.hi {
    border-color: #F5BE2B; background: rgba(155, 77, 232, 0.15); color: #1a1440;
    box-shadow: 0 0 20px rgba(245, 190, 43, 0.3);
    animation: currentNodePulse 1.6s ease-in-out infinite;
  }
  .tree-node.hi.appear {
    animation:
      treeNodeIn 0.75s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
      currentNodePulse 1.6s ease-in-out 0.8s infinite;
    animation-delay: calc(var(--tree-order, 0) * 0.12s), 0.8s;
  }
  .tree-node.visited {
    background: #f1ecfb; border-color: #7726B6;
  }
  .tree-node-order {
    position: absolute; top: -14px; right: -14px; width: 26px; height: 26px;
    background: #7726B6; color: #ffffff; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 14px; font-weight: bold;
    border: 1.5px solid #ffffff;
  }
  .tree-line {
    stroke: #c5bce8; stroke-width: 3; transition: stroke 0.5s;
  }
  .tree-line.appear {
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    animation: treeLineDraw 0.85s ease-out forwards;
    animation-delay: calc(var(--tree-order, 0) * 0.12s);
  }
  .tree-line.visited-line {
    stroke: #7726B6; stroke-width: 4;
  }
  @keyframes treeNodeIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); filter: blur(4px); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); filter: blur(0); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
  }
  @keyframes currentNodePulse {
    0%, 100% { box-shadow: 0 0 18px rgba(245, 190, 43, 0.28); }
    50% { box-shadow: 0 0 34px rgba(245, 190, 43, 0.58); }
  }
  @keyframes treeLineDraw {
    from { stroke-dashoffset: 1; opacity: 0.2; }
    to { stroke-dashoffset: 0; opacity: 1; }
  }

  /* Stack / Queue CSS */
  .sq-container {
    width: 100%; padding: 12px 0; display: flex; justify-content: center;
  }
  .stack-box {
    width: 260px; height: 260px; border: 3px solid #c5bce8; border-top: none;
    border-radius: 0 0 16px 16px; display: flex; flex-direction: column-reverse;
    justify-content: flex-start; padding: 12px; gap: 10px;
    background: rgba(155, 77, 232, 0.03);
  }
  .queue-box {
    width: 85%; height: 90px; border: 3px solid #c5bce8; border-left: none; border-right: none;
    display: flex; flex-direction: row-reverse; justify-content: flex-start;
    align-items: center; padding: 8px; gap: 10px; background: rgba(155, 77, 232, 0.03);
  }
  .sq-element {
    background: #ede8f8; border: 2.5px solid #c5bce8; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Be Vietnam Pro', sans-serif; font-size: 22px; font-weight: 700;
    color: #3d3360; transition: all 0.3s ease;
  }
  .stack-box .sq-element {
    width: 100%; height: 48px;
  }
  .queue-box .sq-element {
    width: 120px; height: 60px; flex-shrink: 0;
  }
  .sq-element.hi {
    border-color: #F5BE2B; background: rgba(155, 77, 232, 0.15);
    box-shadow: 0 0 15px rgba(245, 190, 43, 0.25);
  }
  .sq-element.pushed {
    animation: pushAnim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes pushAnim {
    from { opacity: 0; transform: scale(0.7) translateY(-30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Error Fallback CSS */
  .err-fallback {
    width: 100%; padding: 20px; text-align: center; background: rgba(239, 68, 68, 0.05);
    border: 1px dashed rgba(239, 68, 68, 0.4); border-radius: 12px;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ef4444; font-size: 20px;
  }

  /* 4. VARIABLES PANEL (BLUE THEME) */
  .variables-panel {
    background: #f0f4f8 !important;
    border-color: rgba(43, 156, 245, 0.15) !important;
  }
  .variables-panel .panel-label {
    color: #3b719f !important;
  }
  .var-rows { display: flex; flex-direction: column; gap: 10px; }
  .var-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px; border-radius: 12px; transition: background 0.25s;
    background: rgba(43, 156, 245, 0.05); border: 1px solid rgba(43, 156, 245, 0.1);
  }
  .var-row.changed {
    background: rgba(245, 190, 43, 0.1);
    border-color: rgba(245, 190, 43, 0.4);
    animation: pulseBorderBlue 1.5s infinite alternate;
  }
  @keyframes pulseBorderBlue {
    0% { border-color: rgba(245, 190, 43, 0.2); }
    100% { border-color: rgba(245, 190, 43, 0.6); }
  }
  .var-name { font-family: 'Be Vietnam Pro', sans-serif; font-size: 26px; font-weight: 700; color: #2b5c8f; }
  .var-val { font-family: 'Courier New', Courier, monospace; font-size: 26px; color: #1a3c60; font-weight: bold; }
  .var-val .old { color: rgba(26, 35, 60, 0.35); text-decoration: line-through; margin-right: 10px; font-size: 22px; }
  .var-val .arrow { color: #F5BE2B; margin: 0 10px; font-size: 22px; }

  /* 5. ACTION CAPTION (~6%) */

  .caption {
    font-family: 'Be Vietnam Pro', sans-serif; font-size: 30px; font-weight: 900; color: #214a76;
    text-align: center; padding: 22px 28px; background: linear-gradient(135deg, #f8fbff 0%, #edf5ff 100%);
    border: 1.5px solid rgba(43, 115, 197, 0.24); border-radius: 20px;
    box-shadow: 0 12px 28px rgba(43, 115, 197, 0.12); min-height: 80px;
  }

  /* 6. DEBUGGER CONTROLS (AESTHETIC) */
  .controls-panel {
    display: flex; gap: 20px; justify-content: center; margin-top: 10px;
  }
  .btn {
    font-family: 'Be Vietnam Pro', sans-serif; font-size: 24px; padding: 14px 44px; border-radius: 999px;
    border: 2.5px solid #2b73c5; background: #ffffff; color: #2b73c5; font-weight: 700;
    transition: all 0.2s ease;
    box-shadow: none;
  }
  .btn.primary {
    background: #2b73c5;
    color: #ffffff;
    border-color: #2b73c5;
    box-shadow: none;
  }
  .btn:disabled { opacity: 0.35; }

  /* Progress Bar */
  .progress-panel {
    width: 100%; margin-top: 10px;
  }
  .progress { height: 6px; background: rgba(237,232,248,.88); border-radius: 3px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #7c5ef0, #F5BE2B); border-radius: 3px; transition: width 0.3s; }

  /* ChuyenTin dark preview palette override - placed last to win cascade */
  html, body { background: #05020a !important; }
  #root { background: #191127 !important; color: #FFFFFF !important; }
  .bg { background: linear-gradient(145deg, #191127 0%, #1A0A2E 48%, #2A1045 100%) !important; }
  .grid { opacity: .2 !important; background-image: linear-gradient(rgba(241,236,251,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(241,236,251,.07) 1px, transparent 1px) !important; }
  .panel, .code-panel, .state-panel, .visual-panel, .data-panel, .variables-panel, .caption-panel, .controls-panel, .progress-panel {
    background: rgba(25,17,39,.56) !important;
    border-color: rgba(241,236,251,.16) !important;
    color: #F7F4FF !important;
    box-shadow: 0 16px 32px rgba(0,0,0,.20) !important;
  }
  .variables-panel, .data-panel {
    background: rgba(36,24,56,.70) !important;
    border-color: rgba(241,236,251,.20) !important;
  }
  .caption-panel, .controls-panel, .progress-panel {
    background: rgba(30,20,46,.58) !important;
  }
  .code-panel { background: rgba(18,12,28,.82) !important; border-color: rgba(241,236,251,.14) !important; }
  .code-row { background: rgba(255,255,255,.02) !important; }
  .code-row .cd, .var-val, .var-name, .caption, .panel-title, .panel-label { color: rgba(247,244,255,.82) !important; }
  .code-row .ln { color: rgba(103,91,160,.96) !important; }
  .code-row.active { background: rgba(245,190,43,.92) !important; color: #100a26 !important; border-left-color: #F5BE2B !important; }
  .code-row.active .cd, .code-row.active .ln, .code-row.active .cd * { color: #100a26 !important; }
  .code-kw { color: #ff79c6 !important; font-weight: 800 !important; }
  .code-fn { color: #8be9fd !important; font-weight: 800 !important; }
  .code-str { color: #50fa7b !important; }
  .code-num { color: #ffb86c !important; }
  .arr-cell, .node, .tree-node {
    background: rgba(251,249,255,.90) !important;
    border-color: rgba(241,236,251,.52) !important;
    color: #1d1632 !important;
  }
  .arr-cell.hi, .node.current, .tree-node.current {
    border-color: #F5BE2B !important;
    background: rgba(243,237,255,.94) !important;
    box-shadow: 0 0 0 8px rgba(245,190,43,.12), 0 12px 20px rgba(0,0,0,.16) !important;
  }
  .var-row {
    background: rgba(255,255,255,.06) !important;
    border-color: rgba(241,236,251,.16) !important;
    color: #F7F4FF !important;
  }
  .var-row.changed {
    background: rgba(245,190,43,.12) !important;
    border-color: rgba(245,190,43,.34) !important;
  }
  .caption {
    background: rgba(241,236,251,.07) !important;
    border-color: rgba(241,236,251,.12) !important;
    color: rgba(247,244,255,.84) !important;
  }
  .btn {
    background: rgba(255,255,255,.06) !important;
    border-color: rgba(241,236,251,.18) !important;
    color: #F7F4FF !important;
  }
  .btn.primary { background: #F5BE2B !important; border-color: #F5BE2B !important; color: #191127 !important; }
  .progress { background: rgba(241,236,251,.14) !important; }
  .progress-bar { background: linear-gradient(90deg, #7726B6, #F5BE2B) !important; }

  /* Animations */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
    <div class="bg"></div>
    <div class="glow"></div>
    <div class="grid"></div>
    <div class="accent-top"></div>

    <!-- 1. BADGE -->
    <div class="stack-item badge-container">
      <div class="badge" id="badge">BƯỚC 1 · DÒNG 7</div>
    </div>

    <!-- 2. CODE PANEL -->
    <div class="stack-item panel code-panel">
      <div class="panel-label">💻 CODE</div>
      <div class="code-lines" id="code-block">
        <!-- Dynamic code lines -->
      </div>
    </div>

    <!-- 3. DATA PANEL -->
    <div class="stack-item panel data-panel" id="data-panel">
      <div class="panel-label" id="data-panel-label">📊 DỮ LIỆU</div>
      <div id="data-visual-container">
        <!-- Dynamic content for array, linked_list, tree, stack_queue -->
      </div>
    </div>

    <!-- 4. VARIABLES PANEL -->
    <div class="stack-item panel variables-panel">
      <div class="panel-label">🔍 BIẾN</div>
      <div class="var-rows" id="var-rows">
        <!-- Dynamic variable rows -->
      </div>
    </div>

    <!-- 5. ACTION CAPTION -->
    <div class="stack-item caption-panel">
      <div class="caption" id="caption">Đang thực hiện...</div>
    </div>



    <!-- Progress Bar -->
    <div class="stack-item progress-panel">
      <div class="progress">
        <div class="progress-bar" id="prog"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes && typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};

      // 1. Render Badge
      var badgeEl = document.getElementById("badge");
      if (badgeEl && v.badge) {
        badgeEl.textContent = String(v.badge);
      }

      // Progress bar & button states
      var stepIndex = typeof v.step_index === "number" ? v.step_index : 0;
      var totalSteps = typeof v.total_steps === "number" ? v.total_steps : 1;
      var progBar = document.getElementById("prog");
      if (progBar && totalSteps > 0) {
        var pct = (stepIndex / totalSteps) * 100;
        progBar.style.width = pct + "%";
      }

      var prevBtn = document.getElementById("btn-prev");
      var nextBtn = document.getElementById("btn-next");
      if (prevBtn) {
        prevBtn.disabled = (stepIndex <= 1);
      }
      if (nextBtn) {
        if (stepIndex >= totalSteps) {
          nextBtn.textContent = "Xong ✓";
          nextBtn.disabled = true;
        } else {
          nextBtn.textContent = "Tiếp →";
        }
      }

      // 2. Render Code lines
      var cb = document.getElementById("code-block");
      var codeLines = Array.isArray(v.code_lines) ? v.code_lines : [];
      var activeLineNum = typeof v.active_line_num === "number" ? v.active_line_num : -1;

      var funcName = "";
      if (codeLines.length > 0) {
        var firstLineText = typeof codeLines[0] === "string" ? codeLines[0] : (codeLines[0].t || "");
        var match = firstLineText.match(/([a-zA-Z0-9_]+)\s*\(/);
        if (match && match[1]) {
          funcName = match[1] + "()";
        }
      }
      var panelLabelEl = document.querySelector(".code-panel .panel-label");
      if (panelLabelEl) {
        panelLabelEl.innerHTML = "💻 CODE" + (funcName ? " — " + funcName.toUpperCase() : "");
      }
      var codePanelEl = document.querySelector(".code-panel");
      var codeBlockEl = document.getElementById("code-block");

      function highlightSyntax(text) {
        var escaped = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
        escaped = escaped.replace(/(".*?")/g, '<span class="code-str">$1</span>');
        var keywords = ["int", "for", "return", "void", "main", "const", "printf"];
        keywords.forEach(function (kw) {
          var regex = new RegExp("\\b" + kw + "\\b", "g");
          if (kw === "printf") {
            escaped = escaped.replace(regex, '<span class="code-fn">' + kw + '</span>');
          } else {
            escaped = escaped.replace(regex, '<span class="code-kw">' + kw + '</span>');
          }
        });
        escaped = escaped.replace(/\b(\d+)\b/g, '<span class="code-num">$1</span>');
        return escaped;
      }

      if (cb && codeLines.length) {
        cb.innerHTML = "";
        codeLines.forEach(function (row) {
          var lnVal = -1;
          var textVal = "";
          if (typeof row === "string") {
            textVal = row;
          } else if (row && typeof row === "object") {
            lnVal = typeof row.n === "number" ? row.n : -1;
            textVal = row.t || "";
          }

          var rowDiv = document.createElement("div");
          var isActive = (lnVal === activeLineNum);
          rowDiv.className = "code-row" + (isActive ? " active" : "");

          var lnSpan = document.createElement("span");
          lnSpan.className = "ln";
          lnSpan.textContent = lnVal >= 0 ? String(lnVal) : "";
          rowDiv.appendChild(lnSpan);

          var cdSpan = document.createElement("span");
          cdSpan.className = "cd";
          if (isActive) {
            cdSpan.innerHTML = '<span class="marker">▶</span>' + highlightSyntax(textVal);
          } else {
            cdSpan.innerHTML = ' &nbsp;&nbsp;' + highlightSyntax(textVal);
          }
          rowDiv.appendChild(cdSpan);

          cb.appendChild(rowDiv);
        });
      }

      // 3. Render Data Structure Visualizer
      var dataPanel = document.getElementById("data-panel");
      var dataLabel = document.getElementById("data-panel-label");
      var dataContainer = document.getElementById("data-visual-container");

      var dsType = v.data_structure_type || "array";

      if (dataContainer && dataPanel) {
        dataContainer.innerHTML = "";

        if (dsType === "none" || dsType === "custom") {
          dataPanel.style.display = "none";
        } else {
          dataPanel.style.display = "block";
          try {
            if (dsType === "array") {
              var arrayElements = Array.isArray(v.array_elements) ? v.array_elements : [];
              if (!arrayElements.length) {
                throw new Error("Missing 'array_elements' input for array visualization");
              }
              dataLabel.innerHTML = "📊 MẢNG";

            var strip = document.createElement("div");
            strip.className = "arr-strip";

            var highlightIndices = Array.isArray(v.highlight_indices) ? v.highlight_indices : [];
            var swapIndices = Array.isArray(v.swap_indices) ? v.swap_indices : [];
            var ptrs = v.pointers || {};

            var renderElements = arrayElements.slice();
            var i1 = -1, i2 = -1;
            if (swapIndices.length === 2) {
              i1 = Math.min(swapIndices[0], swapIndices[1]);
              i2 = Math.max(swapIndices[0], swapIndices[1]);
              var temp = renderElements[i1];
              renderElements[i1] = renderElements[i2];
              renderElements[i2] = temp;
            }

            renderElements.forEach(function (val, idx) {
              var cell = document.createElement("div");
              var isHi = highlightIndices.includes(idx);
              var isSwap = swapIndices.includes(idx);
              
              var swapClass = "";
              if (idx === i1) {
                swapClass = " swap-right";
                var dist = (i2 - i1) * 114;
                cell.style.setProperty('--swap-dist', dist + 'px');
              } else if (idx === i2) {
                swapClass = " swap-left";
                var dist = (i2 - i1) * 114;
                cell.style.setProperty('--swap-dist', dist + 'px');
              }

              cell.className = "arr-cell" + (isHi ? " hi" : "") + swapClass;

              var valInner = document.createElement("span");
              valInner.className = "arr-val-inner";
              valInner.textContent = String(val);
              cell.appendChild(valInner);

              var ptrSpan = document.createElement("span");
              var ptrText = ptrs[idx] || "";
              ptrSpan.className = "arr-ptr" + (ptrText ? "" : " empty");
              ptrSpan.textContent = ptrText || "·";
              cell.appendChild(ptrSpan);

              strip.appendChild(cell);
            });
            dataContainer.appendChild(strip);

          } else if (dsType === "linked_list") {
            var nodes = Array.isArray(v.nodes) ? v.nodes : [];
            if (!nodes.length) {
              throw new Error("Missing 'nodes' input for linked_list visualization");
            }
            dataLabel.innerHTML = "🔗 DANH SÁCH LIÊN KẾT";

            var strip = document.createElement("div");
            strip.className = "list-strip";

            var currentPointer = v.current_pointer || {};
            var highlightNodeIds = Array.isArray(v.highlight_node_ids) ? v.highlight_node_ids : [];
            var changedLinkFrom = v.changed_link_from;
            var changedLinkTo = v.changed_link_to;

            nodes.forEach(function (node, idx) {
              var nodeDiv = document.createElement("div");
              var isHi = highlightNodeIds.includes(node.id);
              nodeDiv.className = "list-node" + (isHi ? " hi" : "");
              nodeDiv.id = "list-node-" + node.id;

              var valDiv = document.createElement("div");
              valDiv.className = "node-val";
              valDiv.textContent = String(node.value);
              nodeDiv.appendChild(valDiv);

              var nextDiv = document.createElement("div");
              nextDiv.className = "node-next";
              nextDiv.textContent = node.next ? "next" : "Ø";
              nodeDiv.appendChild(nextDiv);

              if (currentPointer.node_id === node.id) {
                var ptrLabel = document.createElement("div");
                ptrLabel.className = "list-node-ptr";
                ptrLabel.textContent = currentPointer.label || "ptr";
                nodeDiv.appendChild(ptrLabel);
              }

              strip.appendChild(nodeDiv);

              if (node.next) {
                var arrowDiv = document.createElement("div");
                var isChangedLink = (changedLinkFrom === node.id && changedLinkTo === node.next);
                arrowDiv.className = "list-arrow" + (isChangedLink ? " changed-link" : "");
                arrowDiv.textContent = "→";
                strip.appendChild(arrowDiv);
              }
            });
            dataContainer.appendChild(strip);

          } else if (dsType === "tree") {
            var treeNodes = Array.isArray(v.tree_nodes) ? v.tree_nodes : [];
            if (!treeNodes.length) {
              throw new Error("Missing 'tree_nodes' input for tree visualization");
            }
            dataLabel.innerHTML = "🌲 CÂY NHỊ PHÂN";

            var treeContainer = document.createElement("div");
            treeContainer.className = "tree-container";

            var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("style", "position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;");
            treeContainer.appendChild(svg);

            var currentId = v.current_id;
            var visitedIds = Array.isArray(v.visited_ids) ? v.visited_ids : [];
            var traversalOrder = Array.isArray(v.traversal_order) ? v.traversal_order : [];

            var nodesMap = {};
            var rootNode = null;
            treeNodes.forEach(function (n) {
              nodesMap[n.id] = { id: n.id, value: n.value, parent: n.parent, children: [] };
            });
            treeNodes.forEach(function (n) {
              if (n.parent === null || !n.parent) {
                rootNode = nodesMap[n.id];
              } else if (nodesMap[n.parent]) {
                nodesMap[n.parent].children.push(nodesMap[n.id]);
              }
            });

            function assignCoordinates(node, x, y, widthShare) {
              node.x = x;
              node.y = y;
              if (node.children.length === 1) {
                assignCoordinates(node.children[0], x, y + 30, widthShare);
              } else if (node.children.length === 2) {
                assignCoordinates(node.children[0], x - widthShare / 2, y + 30, widthShare / 2);
                assignCoordinates(node.children[1], x + widthShare / 2, y + 30, widthShare / 2);
              }
            }
            if (rootNode) {
              assignCoordinates(rootNode, 50, 20, 42);
            }

            treeNodes.forEach(function (n) {
              var nodeObj = nodesMap[n.id];
              if (nodeObj && nodeObj.parent && nodesMap[nodeObj.parent]) {
                var pObj = nodesMap[nodeObj.parent];
                var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", pObj.x + "%");
                line.setAttribute("y1", pObj.y + "%");
                line.setAttribute("x2", nodeObj.x + "%");
                line.setAttribute("y2", nodeObj.y + "%");
                var isVisited = visitedIds.includes(nodeObj.id) && visitedIds.includes(pObj.id);
                var isNewLine = !visitedIds.includes(nodeObj.id) || currentId === nodeObj.id;
                line.setAttribute("class", "tree-line" + (isVisited ? " visited-line" : "") + (isNewLine ? " appear" : ""));
                line.style.setProperty("--tree-order", String(treeNodes.indexOf(n) + 1));
                svg.appendChild(line);
              }
            });

            treeNodes.forEach(function (n) {
              var nodeObj = nodesMap[n.id];
              if (!nodeObj) return;

              var nodeDiv = document.createElement("div");
              var isHi = (currentId === n.id);
              var isVisited = visitedIds.includes(n.id);
              var shouldAppear = !isVisited || isHi;
              nodeDiv.className = "tree-node" + (isHi ? " hi" : "") + (isVisited ? " visited" : "") + (shouldAppear ? " appear" : "");
              nodeDiv.style.left = nodeObj.x + "%";
              nodeDiv.style.top = nodeObj.y + "%";
              nodeDiv.style.setProperty("--tree-order", String(treeNodes.indexOf(n)));
              nodeDiv.textContent = String(nodeObj.value);

              var orderIdx = traversalOrder.indexOf(n.id);
              if (orderIdx >= 0) {
                var badge = document.createElement("div");
                badge.className = "tree-node-order";
                badge.textContent = String(orderIdx + 1);
                nodeDiv.appendChild(badge);
              }

              treeContainer.appendChild(nodeDiv);
            });

            dataContainer.appendChild(treeContainer);

          } else if (dsType === "stack_queue") {
            var elements = Array.isArray(v.elements) ? v.elements : [];
            var isStack = v.container_type === "stack";
            dataLabel.innerHTML = isStack ? "🥞 NGĂN XẾP (STACK)" : "🎟️ HÀNG ĐỢI (QUEUE)";

            var sqContainer = document.createElement("div");
            sqContainer.className = "sq-container";

            var box = document.createElement("div");
            box.className = isStack ? "stack-box" : "queue-box";

            var topOrFrontId = v.top_or_front_id;
            var justPushedId = v.just_pushed_id;

            elements.forEach(function (el) {
              var elDiv = document.createElement("div");
              var isHi = (topOrFrontId === el.id);
              var isPushed = (justPushedId === el.id);
              elDiv.className = "sq-element" + (isHi ? " hi" : "") + (isPushed ? " pushed" : "");
              elDiv.textContent = String(el.value);
              box.appendChild(elDiv);
            });

            sqContainer.appendChild(box);
            dataContainer.appendChild(sqContainer);
          } else {
            throw new Error("Unknown data_structure_type: " + dsType);
          }
        } catch (err) {
          var errDiv = document.createElement("div");
          errDiv.className = "err-fallback";
          errDiv.innerHTML = "⚠️ <strong>Lỗi hiển thị dữ liệu:</strong> " + err.message;
          dataContainer.appendChild(errDiv);
        }
      }
    }

      // 4. Render Variables
      var vr = document.getElementById("var-rows");
      var variables = Array.isArray(v.variables) ? v.variables : [];
      if (vr && variables.length) {
        vr.innerHTML = "";
        variables.forEach(function (variable) {
          var name = "";
          var value = "";
          var oldValue = "";
          var changed = false;

          if (typeof variable === "string") {
            var parts = variable.split("=");
            name = parts[0] ? parts[0].trim() : "";
            value = parts[1] ? parts[1].trim() : "";
          } else if (variable && typeof variable === "object") {
            name = variable.name || "";
            value = variable.value || "";
            oldValue = variable.old_value || "";
            changed = !!variable.changed;
          }

          if (!name) return;

          var row = document.createElement("div");
          row.className = "var-row" + (changed ? " changed" : "");

          var nameSpan = document.createElement("span");
          nameSpan.className = "var-name";
          nameSpan.textContent = String(name);
          row.appendChild(nameSpan);

          var valSpan = document.createElement("span");
          valSpan.className = "var-val";

          if (oldValue) {
            var oldEl = document.createElement("span");
            oldEl.className = "old";
            oldEl.textContent = String(oldValue);
            valSpan.appendChild(oldEl);

            var arrowEl = document.createElement("span");
            arrowEl.className = "arrow";
            arrowEl.textContent = "→";
            valSpan.appendChild(arrowEl);
          }

          var newValEl = document.createTextNode(String(value));
          valSpan.appendChild(newValEl);

          row.appendChild(valSpan);
          vr.appendChild(row);
        });
      }

      // 5. Render Caption
      var captionEl = document.getElementById("caption");
      if (captionEl && v.status) {
        captionEl.textContent = String(v.status);
      } else if (captionEl) {
        captionEl.textContent = "Đang thực hiện...";
      }

      // Register HyperFrames timeline (required to avoid 45s timeout)
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
    })();
  </script>
</body>
</html>
