<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>CT Bold Poster · 16:9</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&family=Be+Vietnam+Pro:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
<style>
  /*
   * ct-bold-poster — ChuyenTin branded editorial bold poster. 16:9 landscape.
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #ffffff; }
  #root {
    position: relative; width: 1920px; height: 1080px;
    background: #ffffff; color: #1a1440;
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
  }

  .bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #f0edf8 0%, #ffffff 50%, #f0edf8 100%);
    background-size: 200% 200%;
    animation: bgShift 12s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes bgShift {
    from { background-position: 0% 30%; }
    to { background-position: 100% 70%; }
  }

  #root::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(10, 5, 20, 0.18) 100%);
    z-index: 99; pointer-events: none;
  }

  #root {
    animation: pushIn 5s linear forwards;
  }
  @keyframes pushIn {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }
  .glow {
    position: absolute;
    width: 1000px; height: 1000px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 190, 43, 0.08) 0%, transparent 65%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  }

  /* top kicker: label + gold/purple rule */
  .kicker { position: absolute; top: 92px; left: 110px; right: 110px;
    display: flex; align-items: center; gap: 28px; z-index: 5; }
  .kicker .label { font-size: 22px; font-weight: 700; letter-spacing: 6px;
    text-transform: uppercase; color: #9B4DE8; white-space: nowrap;
    opacity: 0; animation: fade 0.5s ease-out 0.35s forwards; }
  .kicker .rule { flex: 1; height: 3px; background: linear-gradient(to right, #7726B6, #F5BE2B); transform-origin: left center;
    transform: scaleX(0); animation: ruleX 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; }
  .kicker .date { font-size: 22px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(26, 20, 48, 0.5); white-space: nowrap;
    opacity: 0; animation: fade 0.5s ease-out 0.55s forwards; }
  @keyframes ruleX { to { transform: scaleX(1); } }

  /* giant gold figure */
  .figure { position: absolute; top: 150px; right: 96px; font-family: 'Quicksand', sans-serif;
    font-weight: 900; font-size: 300px; line-height: 0.8; color: #F5BE2B; letter-spacing: 1px;
    text-shadow: 0 0 60px rgba(245, 190, 43, 0.4);
    opacity: 0; transform: translateY(-60px) rotate(-14deg);
    animation: figureIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards; z-index: 2; }
  @keyframes figureIn { to { opacity: 1; transform: translateY(0) rotate(-6deg); } }

  /* three-line headline */
  .head { position: absolute; left: 110px; bottom: 300px; font-family: 'Quicksand', sans-serif;
    font-weight: 900; line-height: 0.95; z-index: 5; }
  .head .ln { display: block; font-size: 132px; opacity: 0; transform: translateY(40px); }
  .head .ln1 { color: #1a1440; transform-origin: left bottom; animation: lineUp 0.7s cubic-bezier(0.16,1,0.3,1) 1.15s forwards; }
  .head .ln2 { color: #F5BE2B; animation: lineUpTilt 0.7s cubic-bezier(0.16,1,0.3,1) 1.35s forwards; }
  .head .ln3 { color: #1a1440; animation: lineUpTilt2 0.7s cubic-bezier(0.16,1,0.3,1) 1.55s forwards; }
  @keyframes lineUp { to { opacity: 1; transform: translateY(0) rotate(-2deg); } }
  @keyframes lineUpTilt { to { opacity: 1; transform: translateY(0) rotate(-4deg); } }
  @keyframes lineUpTilt2 { to { opacity: 1; transform: translateY(0) rotate(2deg); } }

  /* italic standfirst */
  .standfirst { position: absolute; left: 114px; bottom: 170px; max-width: 980px;
    font-family: 'Be Vietnam Pro', sans-serif; font-style: italic; font-weight: 500; font-size: 34px;
    line-height: 1.45; color: rgba(26, 20, 48, 0.7); z-index: 5;
    opacity: 0; animation: fadeUp 0.7s ease-out 1.95s forwards; }
  @keyframes fadeUp { 0%{opacity:0;transform:translateY(22px)} 100%{opacity:1;transform:translateY(0)} }

  /* footer */
  .footer { position: absolute; left: 110px; right: 110px; bottom: 96px; z-index: 5; }
  .footer .rule { height: 2px; background: rgba(155, 77, 232, 0.25); transform-origin: left center;
    transform: scaleX(0); animation: ruleX 0.7s cubic-bezier(0.16,1,0.3,1) 2.15s forwards; }
  .footer .meta { display: flex; justify-content: space-between; margin-top: 18px;
    font-size: 18px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(26, 20, 48, 0.5); opacity: 0; animation: fade 0.6s ease-out 2.4s forwards; }
  .footer .meta .red { color: #F5BE2B; }

  @keyframes fade { to { opacity: 1; } }

  /* floating bubbles */
  @keyframes fb1 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(22px,-38px) scale(1.06)} 70%{transform:translate(-16px,-18px) scale(0.94)} }
  @keyframes fb2 { 0%,100%{transform:translate(0,0) scale(1.02)} 35%{transform:translate(-28px,26px) scale(0.92)} 68%{transform:translate(18px,-32px) scale(1.08)} }
  .bubble {
    position: absolute; border-radius: 50%; pointer-events: none; z-index: 1; opacity: 0.4;
  }
  .bb1 {
    width: 150px; height: 150px; top: 15%; left: 8%;
    background: radial-gradient(circle at 35% 35%, rgba(155, 77, 232, 0.2), transparent);
    border: 1.5px solid rgba(155, 77, 232, 0.15);
    animation: fb1 15s ease-in-out infinite;
  }
  .bb2 {
    width: 100px; height: 100px; top: 40%; right: 10%;
    background: radial-gradient(circle at 35% 30%, rgba(245, 190, 43, 0.15), transparent);
    border: 1.5px solid rgba(245, 190, 43, 0.1);
    animation: fb2 11s ease-in-out infinite;
  }
  /* ChuyenTin dark preview palette override */
  html, body { background: #05020a; }
  #root { background: #191127 !important; color: #FFFFFF !important; }
  .bg { background: linear-gradient(145deg, #191127 0%, #1A0A2E 48%, #2A1045 100%) !important; }
  .kicker .label, .footer .meta .red { color: #F5BE2B !important; }
  .kicker .date, .footer .meta, .standfirst { color: rgba(255,255,255,.74) !important; }
  .head .ln1, .head .ln3 { color: #FFFFFF !important; }
  .figure, .head .ln2 { color: #F5BE2B !important; }
  .footer .rule { background: rgba(241,236,251,.24) !important; }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="5"
    data-width="1920"
    data-height="1080"
  >
    <div class="bg"></div>
    <div class="glow"></div>
    <div class="bubble bb1"></div>
    <div class="bubble bb2"></div>

    <div class="kicker">
      <span class="label"></span>
      <span class="rule"></span>
      <span class="date"></span>
    </div>

    <div class="figure"></div>

    <div class="head">
      <span class="ln ln1"></span>
      <span class="ln ln2"></span>
      <span class="ln ln3"></span>
    </div>

    <p class="standfirst"></p>

    <div class="footer">
      <div class="rule"></div>
      <div class="meta">
        <span class="footer-left"></span>
        <span class="footer-right red"></span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes && typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      
      var set = function (sel, text) {
        var el = document.querySelector(sel);
        if (el && text != null) el.textContent = String(text);
      };

      set(".kicker .label", v.kicker);
      set(".kicker .date", v.date);
      set(".figure", v.figure);
      set(".standfirst", v.standfirst);
      set(".footer-left", v.footer_left);
      set(".footer-right", v.footer_right);

      var headline = Array.isArray(v.headline) ? v.headline : [];
      set(".head .ln1", headline[0]);
      set(".head .ln2", headline[1]);
      set(".head .ln3", headline[2]);
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function(){}, seek: function(){}, paused: function(){ return true; } };
  </script>
</body>
</html>
